<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0f0f0f; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
</style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased">

<!-- HEADER -->
<header class="sticky top-0 z-40 flex justify-between items-center px-4 py-3 bg-[#0f0f0f]/95 backdrop-blur border-b border-gray-800">
  <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
    <i class="fa-brands fa-youtube text-red-600 text-3xl"></i>
    <span class="font-bold text-xl tracking-tight hidden sm:block">YouClone</span>
  </div>

  <!-- SEARCH -->
  <div class="flex-1 max-w-xl mx-4">
    <div class="relative group">
      <input id="search" type="text"
        class="w-full bg-[#121212] border border-gray-700 rounded-full px-4 py-2 pl-10 focus:outline-none focus:border-blue-500 transition-colors placeholder-gray-500"
        placeholder="Search videos...">
      <i class="fa-solid fa-search absolute left-3 top-3 text-gray-500"></i>
    </div>
  </div>

  <!-- USER -->
  <div id="userBox" class="flex items-center gap-3 cursor-pointer hover:bg-[#272727] p-1.5 pr-3 rounded-full transition-colors">
    <div id="avatar" class="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center text-sm font-bold shadow-lg">G</div>
    <span id="username" class="text-sm font-medium hidden sm:block">Guest</span>
  </div>
</header>

<!-- MAIN GRID -->
<main class="p-4 sm:p-6 min-h-screen">
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-6">
    <!-- Videos injected here -->
  </div>
  
  <!-- Loading States -->
  <div id="loader" class="hidden py-8 text-center">
    <i class="fa-solid fa-circle-notch fa-spin text-2xl text-red-600"></i>
  </div>
  
  <div id="endMsg" class="hidden py-8 text-center text-gray-500">No more videos found</div>
  <div id="errorMsg" class="hidden py-8 text-center text-red-500">Failed to connect to backend.</div>
</main>

<!-- MODALS (Login & Profile) -->
<div id="loginPopup" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center">
  <div class="bg-[#1f1f1f] border border-gray-700 p-8 rounded-2xl w-full max-w-sm text-center shadow-2xl">
    <h2 class="text-2xl font-bold mb-2">Login Required</h2>
    <p class="text-gray-400 mb-6 text-sm">Please sign in to watch videos.</p>
    <button onclick="goToAuth()" class="bg-white text-black font-bold px-4 py-3 rounded-full w-full mb-3 hover:bg-gray-200 transition">Sign In</button>
    <button onclick="closePopup('loginPopup')" class="text-gray-400 text-sm hover:text-white transition">Maybe Later</button>
  </div>
</div>

<div id="profilePopup" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center">
  <div class="bg-[#1f1f1f] border border-gray-700 p-6 rounded-xl w-80 text-center shadow-2xl relative">
    <button onclick="closePopup('profilePopup')" class="absolute top-3 right-3 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
    <div id="profileAvatar" class="w-20 h-20 mx-auto rounded-full bg-blue-600 flex items-center justify-center text-3xl font-bold mb-3 shadow-lg border-4 border-[#1f1f1f]">U</div>
    <h2 id="profileName" class="font-bold text-xl">User Name</h2>
    <p id="profileEmail" class="text-gray-400 text-sm mb-6 break-all">email@example.com</p>
    <button onclick="logout()" class="w-full bg-[#272727] hover:bg-red-600/20 hover:text-red-500 text-white py-2 rounded-lg transition flex items-center justify-center gap-2">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </div>
</div>

<script>
const API_URL = "http://localhost:5000/api/videos"; 
const AUTH_URL = "auth.html";

let state = { page: 1, search: "", loading: false, hasMore: true, user: null, authTimer: null };

/* ================= AUTH LOGIC ================= */
function initAuth() {
  const token = localStorage.getItem("token");
  const storedUser = localStorage.getItem("user");
  if (token && storedUser) {
    state.user = JSON.parse(storedUser);
    updateUIUser(state.user);
  } else {
    setGuestMode();
    state.authTimer = setTimeout(() => { if (!state.user) showPopup("loginPopup"); }, 5 * 60 * 1000);
  }
}

function updateUIUser(user) {
  const name = user.name || "User";
  document.getElementById("username").innerText = name;
  document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();
  document.getElementById("avatar").classList.replace("bg-gray-600", "bg-blue-600");
  document.getElementById("profileName").innerText = name;
  document.getElementById("profileEmail").innerText = user.email || "";
  document.getElementById("profileAvatar").innerText = name.charAt(0).toUpperCase();
}

function setGuestMode() {
  state.user = null;
  document.getElementById("username").innerText = "Guest";
  document.getElementById("avatar").innerText = "G";
  document.getElementById("avatar").classList.add("bg-gray-600");
  document.getElementById("avatar").classList.remove("bg-blue-600");
}

function goToAuth() { window.location.href = AUTH_URL; }
function logout() { localStorage.clear(); location.reload(); }
document.getElementById("userBox").addEventListener("click", () => { if (state.user) showPopup("profilePopup"); else showPopup("loginPopup"); });
function showPopup(id) { document.getElementById(id).classList.remove("hidden"); }
function closePopup(id) { document.getElementById(id).classList.add("hidden"); }

// CLICK VIDEO -> GO TO WATCH PAGE
function handleVideoClick(videoId) {
  if (!state.user) { showPopup("loginPopup"); return; }
  window.location.href = `watch.html?id=${videoId}`;
}

/* ================= VIDEO SYSTEM ================= */
async function fetchVideos(reset = false) {
  if (state.loading || !state.hasMore) return;
  state.loading = true;
  
  if (reset) {
    state.page = 1;
    state.hasMore = true;
    document.getElementById("grid").innerHTML = "";
    document.getElementById("endMsg").classList.add("hidden");
    document.getElementById("errorMsg").classList.add("hidden");
    showSkeletons(); // ONLY show skeletons on reset/search
  } else {
    document.getElementById("loader").classList.remove("hidden");
  }

  try {
    const res = await fetch(`${API_URL}?page=${state.page}&limit=12&search=${encodeURIComponent(state.search)}`);
    if (!res.ok) throw new Error("Backend Error");
    const data = await res.json();
    
    if (data.videos && data.videos.length > 0) {
      if(state.page === 1) removeSkeletons(); // Remove skeletons once data arrives
      renderVideos(data.videos);
      state.page++;
    } else {
      state.hasMore = false;
      if(state.page === 1) removeSkeletons();
      document.getElementById("endMsg").classList.remove("hidden");
    }
  } catch (err) {
    console.error(err);
    if(state.page === 1) { removeSkeletons(); document.getElementById("errorMsg").classList.remove("hidden"); }
  } finally {
    state.loading = false;
    document.getElementById("loader").classList.add("hidden");
  }
}

function renderVideos(videos) {
  const grid = document.getElementById("grid");
  videos.forEach(v => {
    const card = document.createElement("div");
    card.className = "group cursor-pointer flex flex-col gap-2 fade-in";
    card.onclick = () => handleVideoClick(v.id);
    card.innerHTML = `
      <div class="relative aspect-video rounded-xl overflow-hidden bg-[#1f1f1f]">
        <img src="${v.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-200">
        <div class="absolute bottom-1 right-1 bg-black/80 text-white text-xs px-1.5 py-0.5 rounded font-medium">${v.duration || "0:00"}</div>
      </div>
      <div class="mt-1"><h3 class="font-bold text-sm leading-tight line-clamp-2 group-hover:text-white text-gray-100">${v.title}</h3></div>
    `;
    grid.appendChild(card);
  });
}

function showSkeletons() {
  document.getElementById("grid").innerHTML = Array(8).fill(0).map(() => `
    <div class="flex flex-col gap-2"><div class="aspect-video rounded-xl skeleton"></div><div class="h-4 w-3/4 rounded skeleton mt-1"></div></div>
  `).join('');
}

function removeSkeletons() {
  if(document.querySelector('.skeleton')) document.getElementById("grid").innerHTML = "";
}

let debounceTimer;
document.getElementById("search").addEventListener("input", (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => { state.search = e.target.value; fetchVideos(true); }, 500);
});

window.addEventListener("scroll", () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) fetchVideos(false);
});

initAuth();
fetchVideos();
</script>
</body>
</html>
