<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔐 Security (GTM added) -->
<meta http-equiv="Content-Security-Policy"
content="
default-src 'self' https:;
script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.googletagmanager.com;
style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
img-src 'self' data: https:;
font-src 'self' https://cdnjs.cloudflare.com;
connect-src 'self' https://yt-player-pbmv.onrender.com https://www.googletagmanager.com;
">

<!-- 🔍 SEO -->
<title id="page-title">UnscPlay</title>
<meta name="description" content="Watch live streams on UnscPlay">
<meta name="keywords" content="live streaming, UnscPlay, video, stream">
<meta name="author" content="UnscPlay">

<!-- 🌐 Open Graph -->
<meta property="og:title" content="UnscPlay">
<meta property="og:description" content="Watch live streams instantly">
<meta property="og:image" content="./assets/img/logo.webp">
<meta property="og:type" content="website">

<!-- 🐦 Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="UnscPlay">
<meta name="twitter:description" content="Live streaming platform">
<meta name="twitter:image" content="./assets/img/logo.webp">

<!-- 🎨 Favicon -->
<link rel="icon" type="image/png" href="./assets/img/logo.webp">

<!-- 🎨 Styles -->
<link rel="stylesheet" href="./assets/css/feed.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- ⚡ Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- 📊 Google Tag Manager -->
<script>
(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id=GTM-XXXXXXX'+dl;
f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-XXXXXXX');
</script>

<!-- ⚡ SIMPLE DYNAMIC SEO -->
<script>
function updateSEO(stream){
  document.title = stream.title + " | UnscPlay";

  const setMeta = (key, value, attr="name") => {
    let tag = document.querySelector(`meta[${attr}="${key}"]`);
    if(tag) tag.setAttribute("content", value);
  };

  setMeta("description", stream.description);
  setMeta("og:title", stream.title, "property");
  setMeta("og:description", stream.description, "property");
  setMeta("og:image", stream.thumbnail, "property");
  setMeta("twitter:title", stream.title);
  setMeta("twitter:description", stream.description);
  setMeta("twitter:image", stream.thumbnail);
}
</script>

</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

<!-- 🔐 SECURITY: Console Warning -->
<script>
(function(){const c=(col,sz='14px')=>`color:${col};font-size:${sz};font-weight:bold;text-shadow:1px 1px 2px #000;`;console.log(`%c🔒 UNSCPLAY - CRITICAL SECURITY LEVEL`,c('#ff0000','22px'));console.log(`%c⚠️  WARNING: This is a restricted environment.\n⚠️  Pasting malicious code can compromise your account.\n🛡️  Active protections: XSS sanitization, rate limiting, DevTools monitoring.`,c('#ffaa00'));})();
</script>

<!-- HEADER -->
<header class="sticky top-0 z-40 glass-panel px-3 sm:px-4 py-3 flex justify-between items-center">
  <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
   <a href="/" class="flex items-center">
  <img src="./assets/img/hlogo.webp" alt="Unscpaly.com Logo" class="h-8 sm:h-10">
  <span class="sr-only">Unscpaly.com</span>
</a>
  </div>
  <!-- Desktop Search -->
  <div class="flex-1 max-w-md mx-2 sm:mx-4 hidden sm:block">
    <div class="relative">
      <input id="searchDesktop" type="text" autocomplete="off" class="w-full bg-[var(--bg-secondary)] border border-[var(--glass-border)] rounded-full px-4 py-2 pl-10 focus:outline-none focus:border-[var(--accent)] placeholder-[var(--text-muted)] text-[var(--text-main)] text-sm" placeholder="Search videos...">
      <i class="fa-solid fa-search absolute left-3 top-2.5 text-[var(--text-muted)]"></i>
    </div>
  </div>
  <!-- Right Actions -->
  <div class="flex items-center gap-2 sm:gap-3">
    <button id="searchTrigger" class="w-9 h-9 sm:hidden rounded-full flex items-center justify-center hover:bg-[var(--card-hover)] text-[var(--text-main)]" aria-label="Search"><i class="fa-solid fa-search text-base"></i></button>
    <div id="userBox" class="flex items-center gap-2 cursor-pointer hover:bg-[var(--card-hover)] p-1 pr-2 sm:pr-3 rounded-full border border-transparent hover:border-[var(--glass-border)]">
      <div id="avatar" class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gray-600 flex items-center justify-center text-xs sm:text-sm font-bold text-white">G</div>
      <span id="username" class="text-xs sm:text-sm font-medium hidden sm:block text-[var(--text-main)]">Guest</span>
    </div>
  </div>
</header>

<!-- Mobile Search Popup -->
<div id="searchPopup" class="search-popup fixed top-0 left-0 right-0 z-50 glass-panel px-4 py-3 flex items-center gap-3 sm:hidden">
  <button id="searchClose" class="w-9 h-9 rounded-full hover:bg-[var(--card-hover)] text-[var(--text-main)]"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="flex-1 relative">
    <input id="searchInput" type="text" autocomplete="off" class="w-full bg-[var(--bg-secondary)] border border-[var(--glass-border)] rounded-full px-4 py-2 pl-10 focus:outline-none focus:border-[var(--accent)] placeholder-[var(--text-muted)] text-[var(--text-main)]" placeholder="Search videos...">
    <i class="fa-solid fa-search absolute left-3 top-3 text-[var(--text-muted)]"></i>
  </div>
  <button id="searchSubmit" class="px-4 py-2 bg-[var(--accent)] hover:opacity-90 text-white rounded-full text-sm font-medium">Search</button>
</div>

<!-- MAIN GRID: 1 mobile / 2 tablet / 3 PC -->
<main class="p-3 sm:p-4 lg:p-6 min-h-screen flex-1">
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-3 sm:gap-x-4 lg:gap-x-6 gap-y-5 sm:gap-y-6 lg:gap-y-8"></div>
  <div id="loader" class="hidden py-8 text-center"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-[var(--accent)]"></i></div>
  <div id="endMsg" class="hidden py-8 text-center text-[var(--text-muted)]">No more videos found</div>
  <div id="errorMsg" class="hidden py-8 text-center text-red-500">Failed to connect to backend.</div>
  <div id="noSearchResults" class="hidden py-8 text-center text-[var(--text-muted)]">No matching videos found. Try different keywords.</div>
</main>

<!-- LOGIN MODAL -->
<div id="loginPopup" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-[var(--bg-secondary)] backdrop-blur-xl border border-[var(--glass-border)] p-8 rounded-2xl w-full max-w-sm text-center shadow-2xl">
    <div class="w-16 h-16 bg-[var(--accent)] rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-lock text-white text-2xl"></i></div>
    <h2 class="text-2xl font-bold mb-2 text-[var(--text-main)]">Login Required</h2>
    <p class="text-[var(--text-muted)] mb-6 text-sm">Please sign in to access the library.</p>
    <button onclick="goToAuth()" class="bg-[var(--accent)] hover:opacity-90 text-white font-bold px-4 py-3 rounded-full w-full mb-3">Sign In</button>
    <button onclick="closePopup('loginPopup')" class="text-[var(--text-muted)] text-sm hover:text-[var(--text-main)]">Maybe Later</button>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profilePopup" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-[var(--bg-secondary)] backdrop-blur-xl border border-[var(--glass-border)] p-6 rounded-2xl w-80 text-center shadow-2xl relative">
    <button onclick="closePopup('profilePopup')" class="absolute top-4 right-4 text-[var(--text-muted)] hover:text-[var(--text-main)]"><i class="fa-solid fa-xmark text-lg"></i></button>
    <div id="profileAvatar" class="w-20 h-20 mx-auto rounded-full bg-blue-600 flex items-center justify-center text-3xl font-bold mb-3 text-white">U</div>
    <h2 id="profileName" class="font-bold text-xl text-[var(--text-main)]">User Name</h2>
    <p id="profileEmail" class="text-[var(--text-muted)] text-sm mb-6 break-all">email@example.com</p>
    <button onclick="logout()" class="w-full bg-[var(--card-hover)] hover:bg-red-500/10 hover:text-red-500 border border-[var(--glass-border)] text-[var(--text-main)] py-2 rounded-xl flex items-center justify-center gap-2"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>
</div>

<script src="/assets/js/feed.js"></script>
</body>
</html>
