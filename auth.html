<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth - YouTube Clone</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background-color: #0f0f0f;
  }
  .auth-card {
    background-color: #1f1f1f;
    border: 1px solid #333;
  }
</style>
</head>

<body class="text-white flex justify-center items-center h-screen">

<div class="auth-card p-8 rounded-2xl shadow-2xl w-full max-w-md">
  
  <div class="text-center mb-6">
    <i class="fa-brands fa-youtube text-red-600 text-5xl mb-2"></i>
    <h2 id="title" class="text-2xl font-bold">Sign In</h2>
    <p class="text-gray-400 text-sm mt-1">to continue to YouTube</p>
  </div>

  <!-- Name Field (Register Only) -->
  <div id="nameField" class="hidden">
    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Name</label>
    <input type="text" id="name" class="w-full bg-[#121212] border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="John Doe" />
  </div>

  <!-- Email Field -->
  <div class="mt-4">
    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Email</label>
    <input type="email" id="email" class="w-full bg-[#121212] border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="you@example.com" />
  </div>

  <!-- Password Field -->
  <div class="mt-4">
    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Password</label>
    <input type="password" id="password" class="w-full bg-[#121212] border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition" placeholder="••••••••" />
  </div>

  <!-- Action Button -->
  <button onclick="handleAuth()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-full mt-6 transition transform active:scale-95">
    Sign In
  </button>

  <!-- Toggle Mode -->
  <div class="text-center mt-6">
    <p class="text-gray-400 text-sm">
      <span id="toggleText">New to YouTube?</span>
      <span onclick="toggleMode()" class="text-blue-500 cursor-pointer hover:underline font-medium ml-1">
        Create Account
      </span>
    </p>
  </div>

</div>

<!-- Font Awesome for Icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
let isLogin = true;

// DOM Elements
const titleEl = document.getElementById("title");
const nameFieldEl = document.getElementById("nameField");
const nameInputEl = document.getElementById("name");
const submitBtnEl = document.getElementById("submitBtn");
const toggleTextEl = document.getElementById("toggleText");

function toggleMode() {
  isLogin = !isLogin;

  if (isLogin) {
    // Switch to Login
    titleEl.innerText = "Sign In";
    submitBtnEl.innerText = "Sign In";
    nameFieldEl.classList.add("hidden");
    toggleTextEl.innerText = "New to YouTube?";
  } else {
    // Switch to Register
    titleEl.innerText = "Create Account";
    submitBtnEl.innerText = "Register";
    nameFieldEl.classList.remove("hidden");
    toggleTextEl.innerText = "Already have an account?";
  }
}

async function handleAuth() {
  const name = nameInputEl.value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.getElementById("submitBtn");

  // Basic Validation
  if (!email || !password) {
    alert("Please fill in all fields");
    return;
  }
  if (!isLogin && !name) {
    alert("Name is required for registration");
    return;
  }

  // UI Loading State
  const originalBtnText = btn.innerText;
  btn.innerText = "Processing...";
  btn.disabled = true;
  btn.classList.add("opacity-50", "cursor-not-allowed");

  const url = isLogin
    ? "http://localhost:5000/api/auth/login"
    : "http://localhost:5000/api/auth/register";

  const payload = isLogin
    ? { email, password }
    : { name, email, password };

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.msg || "Authentication failed");
    }

    // ===========================
    // REGISTER SUCCESS
    // ===========================
    if (!isLogin) {
      alert("Account created! Please sign in.");
      toggleMode(); // Switch back to login view
    } 
    // ===========================
    // LOGIN SUCCESS
    // ===========================
    else {
      // ✅ FIX: Save Token AND User Object
      localStorage.setItem("token", data.token);
      
      // The backend sends { token, user: { id, name, email, role } }
      if (data.user) {
        localStorage.setItem("user", JSON.stringify(data.user));
      }

      // Redirect based on role
      if (data.user && data.user.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "index.html";
      }
    }

  } catch (err) {
    console.error(err);
    alert(err.message);
  } finally {
    // Reset Button
    btn.innerText = originalBtnText;
    btn.disabled = false;
    btn.classList.remove("opacity-50", "cursor-not-allowed");
  }
}
</script>

</body>
</html>
