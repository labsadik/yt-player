<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Video Player</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Video.js CSS -->
<link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />

<style>
  /* Global Dark Theme */
  body { background-color: #0f0f0f; color: #e5e5e5; font-family: 'Inter', sans-serif; }
  
  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1a1a1a; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* Video JS Overrides to make it look Pro */
  .video-js {
    width: 100%;
    height: 100%;
    font-family: 'Inter', sans-serif;
  }
  
  /* Hide default YT controls inside VJS */
  .vjs-tech { object-fit: contain; }

  /* Custom Control Bar Styling */
  .custom-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 20px 10px 10px 10px;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  /* Show controls on hover or pause */
  .player-container:hover .custom-controls,
  .player-container.paused .custom-controls {
    opacity: 1;
  }

  /* Progress Bar Container */
  .progress-container {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    position: relative;
    border-radius: 5px;
    transition: height 0.1s;
  }
  .progress-container:hover { height: 8px; }

  /* Buffered & Played Bars */
  .progress-buffered {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: rgba(255,255,255,0.3);
    width: 0%;
    border-radius: 5px;
    pointer-events: none;
  }
  .progress-played {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: #ef4444; /* Red-500 */
    width: 0%;
    border-radius: 5px;
    pointer-events: none;
  }

  /* Scrubber Handle */
  .scrubber-handle {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px;
    height: 12px;
    background: #ef4444;
    border-radius: 50%;
    left: 0%;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .progress-container:hover .scrubber-handle { opacity: 1; }

  /* Timeline Preview Tooltip */
  .timeline-preview {
    position: absolute;
    bottom: 25px;
    transform: translateX(-50%);
    background: #000;
    border: 2px solid #333;
    border-radius: 6px;
    overflow: hidden;
    display: none; /* Hidden by default */
    pointer-events: none;
    z-index: 20;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .timeline-preview img {
    width: 160px;
    height: 90px;
    object-fit: cover;
    display: block;
  }
  .timeline-time {
    text-align: center;
    font-size: 10px;
    padding: 2px 4px;
    background: #111;
    color: white;
  }

  /* Start Overlay (Thumbnail + Big Play Button) */
  .start-overlay {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
    transition: opacity 0.3s;
  }
  .start-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    transition: background 0.3s;
  }
  .start-overlay:hover::before { background: rgba(0,0,0,0.1); }
  
  .big-play-btn {
    width: 60px;
    height: 60px;
    background: rgba(239, 68, 68, 0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 6;
    transition: transform 0.2s;
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
  }
  .start-overlay:hover .big-play-btn { transform: scale(1.1); }

  /* Loader */
  .loader {
    border: 4px solid rgba(255,255,255,0.1);
    border-left-color: #ef4444;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    display: none;
    z-index: 4;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="sticky top-0 z-50 bg-[#0f0f0f]/95 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center justify-between gap-4">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center">▶</div>
    <h1 class="text-xl font-bold tracking-tight">Stream<span class="text-red-500">Pro</span></h1>
  </div>

  <div class="flex-1 max-w-xl relative">
    <input id="search" type="text" placeholder="Search videos..." 
      class="w-full bg-[#1a1a1a] border border-gray-700 text-sm rounded-full px-4 py-2 focus:outline-none focus:border-red-500 transition-colors pl-10">
    <svg class="w-4 h-4 text-gray-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
  </div>

  <button onclick="playNext()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-full text-sm font-medium transition-colors flex items-center gap-2">
    Next Video <span class="text-xs bg-gray-700 px-1.5 py-0.5 rounded">→</span>
  </button>
</div>

<!-- MAIN CONTENT -->
<div class="max-w-[1600px] mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- PLAYER SECTION (Left) -->
  <div class="lg:col-span-2 space-y-4">
    
    <!-- CUSTOM PLAYER CONTAINER -->
    <div id="player-wrapper" class="player-container paused relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl group select-none">
      
      <!-- Loading Spinner -->
      <div id="loader" class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
        <div class="loader"></div>
      </div>

      <!-- Start Overlay (Thumbnail + Play Btn) -->
      <div id="start-overlay" class="start-overlay" style="background-image: url('');">
        <div class="big-play-btn">
          <svg class="w-8 h-8 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>

      <!-- Video Element (Hidden initially until play) -->
      <video id="my-video" class="video-js vjs-default-skin w-full h-full absolute inset-0 opacity-0 transition-opacity duration-500" preload="none">
        <p class="vjs-no-js">To view this video please enable JavaScript.</p>
      </video>

      <!-- Custom Controls -->
      <div class="custom-controls">
        
        <!-- Progress Bar Area -->
        <div class="relative w-full group/progress">
          <!-- Timeline Preview Popup -->
          <div id="timeline-preview" class="timeline-preview">
            <img id="preview-img" src="" alt="Preview">
            <div id="preview-time" class="timeline-time">00:00</div>
          </div>

          <div class="progress-container" id="progress-bar">
            <div class="progress-buffered" id="buffered-bar"></div>
            <div class="progress-played" id="played-bar"></div>
            <div class="scrubber-handle" id="scrubber"></div>
          </div>
        </div>

        <!-- Buttons Row -->
        <div class="flex items-center justify-between mt-1">
          <div class="flex items-center gap-4">
            <!-- Play/Pause -->
            <button id="btn-play" class="hover:text-red-500 transition-colors">
              <svg id="icon-play" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg id="icon-pause" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <!-- Volume -->
            <div class="flex items-center gap-2 group/vol">
              <button id="btn-mute" class="hover:text-white text-gray-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
              </button>
              <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="1" class="w-0 overflow-hidden group-hover/vol:w-20 transition-all duration-300 h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-red-500">
            </div>

            <!-- Time Display -->
            <div class="text-xs font-medium text-gray-300">
              <span id="current-time">0:00</span> / <span id="duration">0:00</span>
            </div>
          </div>

          <div class="flex items-center gap-3">
             <!-- Quality/Settings Placeholder -->
             <button class="hover:text-white text-gray-300 text-xs font-bold border border-gray-600 rounded px-1">HD</button>
             
             <!-- Fullscreen -->
             <button id="btn-fullscreen" class="hover:text-white text-gray-300">
               <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
             </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Video Info -->
    <div>
      <h2 id="video-title" class="text-2xl font-bold leading-tight mb-2">Loading...</h2>
      <div class="flex items-center justify-between text-sm text-gray-400 border-b border-gray-800 pb-4">
        <div class="flex items-center gap-2">
           <span class="bg-gray-800 px-2 py-1 rounded text-xs">YouTube Source</span>
           <span id="video-date"></span>
        </div>
        <div class="flex gap-4">
           <button class="flex items-center gap-1 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"></path></svg> Like</button>
           <button class="flex items-center gap-1 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg> Share</button>
        </div>
      </div>
    </div>

  </div>

  <!-- PLAYLIST (Right) -->
  <div class="lg:col-span-1">
    <div class="bg-[#121212] rounded-xl border border-gray-800 h-[calc(100vh-100px)] flex flex-col sticky top-24">
      <div class="p-4 border-b border-gray-800">
        <h3 class="font-bold text-lg">Up Next</h3>
        <p class="text-xs text-gray-500 mt-1">Autoplay is off</p>
      </div>
      <div id="playlist" class="flex-1 overflow-y-auto p-2 space-y-2">
        <!-- Items injected via JS -->
      </div>
    </div>
  </div>

</div>

<!-- SCRIPTS -->
<script>
// --- CONFIGURATION ---
const API_URL = "http://localhost:5000/api/videos"; // Change if needed
const YOUTUBE_IFRAME_API = "https://www.youtube.com/iframe_api";

// --- STATE ---
let state = {
  videos: [],
  filtered: [],
  currentIndex: 0,
  isPlaying: false,
  ytPlayer: null,
  updateInterval: null,
  duration: 0
};

// --- DOM ELEMENTS ---
const els = {
  title: document.getElementById('video-title'),
  playlist: document.getElementById('playlist'),
  startOverlay: document.getElementById('start-overlay'),
  loader: document.getElementById('loader'),
  videoTag: document.getElementById('my-video'),
  wrapper: document.getElementById('player-wrapper'),
  
  // Controls
  btnPlay: document.getElementById('btn-play'),
  iconPlay: document.getElementById('icon-play'),
  iconPause: document.getElementById('icon-pause'),
  progressBar: document.getElementById('progress-bar'),
  playedBar: document.getElementById('played-bar'),
  bufferedBar: document.getElementById('buffered-bar'),
  scrubber: document.getElementById('scrubber'),
  currTime: document.getElementById('current-time'),
  durTime: document.getElementById('duration'),
  volSlider: document.getElementById('vol-slider'),
  btnFull: document.getElementById('btn-fullscreen'),
  
  // Preview
  previewBox: document.getElementById('timeline-preview'),
  previewImg: document.getElementById('preview-img'),
  previewTime: document.getElementById('preview-time')
};

// --- INITIALIZATION ---
async function init() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    state.videos = Array.isArray(data.videos) ? data.videos : [];
    state.filtered = [...state.videos];
    
    renderPlaylist();
    if(state.filtered.length > 0) loadVideoState(0);
  } catch (err) {
    console.error("API Error:", err);
    els.title.textContent = "Error loading videos. Check API.";
  }
}

// --- CORE LOGIC ---

function loadVideoState(index) {
  state.currentIndex = index;
  const video = state.filtered[index];
  if(!video) return;

  // Update UI Text
  els.title.textContent = video.title;
  
  // Reset Player State
  stopUpdateLoop();
  state.isPlaying = false;
  updatePlayIcon();
  
  // Show Thumbnail Overlay
  els.startOverlay.style.backgroundImage = `url('${video.thumbnail}')`;
  els.startOverlay.style.display = 'flex';
  els.videoTag.style.opacity = '0'; // Hide actual video element
  
  // Highlight Playlist
  highlightPlaylistItem(index);
  
  // Prepare YouTube Player (Lazy Load)
  setupYouTubePlayer(video.id);
}

function setupYouTubePlayer(videoId) {
  // If API isn't ready, wait
  if (!window.YT || !window.YT.Player) {
    loadYouTubeAPI(() => setupYouTubePlayer(videoId));
    return;
  }

  // Destroy old player if exists
  if (state.ytPlayer) {
    state.ytPlayer.destroy();
  }

  // Create container for YT inside our wrapper
  let ytDiv = document.getElementById('yt-api-div');
  if(!ytDiv) {
    ytDiv = document.createElement('div');
    ytDiv.id = 'yt-api-div';
    ytDiv.className = 'absolute inset-0 z-0';
    els.wrapper.appendChild(ytDiv);
  }

  state.ytPlayer = new YT.Player('yt-api-div', {
    height: '100%',
    width: '100%',
    videoId: videoId,
    playerVars: {
      'autoplay': 0, // We handle autoplay manually
      'controls': 0, // HIDE YT CONTROLS
      'rel': 0,
      'modestbranding': 1,
      'fs': 0
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  state.duration = event.target.getDuration();
  els.durTime.textContent = formatTime(state.duration);
  els.loader.style.display = 'none'; // Hide loader if it was spinning
}

function onPlayerStateChange(event) {
  // YT.PlayerState.PLAYING = 1, PAUSED = 2, ENDED = 0
  if (event.data == YT.PlayerState.PLAYING) {
    state.isPlaying = true;
    els.startOverlay.style.display = 'none';
    els.videoTag.style.opacity = '1'; // Fade in the video element (visual trick)
    els.wrapper.classList.remove('paused');
    startUpdateLoop();
  } else {
    state.isPlaying = false;
    els.wrapper.classList.add('paused');
    stopUpdateLoop();
  }
  
  if (event.data == YT.PlayerState.ENDED) {
     // Auto next?
     // playNext(); 
  }
  updatePlayIcon();
}

// --- USER INTERACTION ---

// 1. Click Thumbnail Overlay -> Play
els.startOverlay.addEventListener('click', () => {
  if(state.ytPlayer && typeof state.ytPlayer.playVideo === 'function') {
    els.loader.style.display = 'flex'; // Show spinner briefly
    state.ytPlayer.playVideo();
  }
});

// 2. Custom Play/Pause Button
els.btnPlay.addEventListener('click', togglePlay);

function togglePlay() {
  if(!state.ytPlayer) return;
  
  if(state.isPlaying) {
    state.ytPlayer.pauseVideo();
  } else {
    // If starting from scratch
    if(els.startOverlay.style.display !== 'none') {
       els.startOverlay.click();
    } else {
       state.ytPlayer.playVideo();
    }
  }
}

function updatePlayIcon() {
  if(state.isPlaying) {
    els.iconPlay.classList.add('hidden');
    els.iconPause.classList.remove('hidden');
  } else {
    els.iconPlay.classList.remove('hidden');
    els.iconPause.classList.add('hidden');
  }
}

// 3. Progress Bar Logic
function startUpdateLoop() {
  state.updateInterval = setInterval(() => {
    if(!state.ytPlayer || !state.isPlaying) return;
    
    const currentTime = state.ytPlayer.getCurrentTime();
    const duration = state.ytPlayer.getDuration();
    
    if(duration > 0) {
      const percent = (currentTime / duration) * 100;
      els.playedBar.style.width = `${percent}%`;
      els.scrubber.style.left = `${percent}%`;
      els.currTime.textContent = formatTime(currentTime);
    }
  }, 500); // Update every 500ms
}

function stopUpdateLoop() {
  clearInterval(state.updateInterval);
}

// 4. Scrubbing / Dragging
let isDragging = false;

els.progressBar.addEventListener('mousedown', (e) => {
  isDragging = true;
  seek(e);
});

document.addEventListener('mousemove', (e) => {
  if(isDragging) seek(e);
  handlePreviewHover(e);
});

document.addEventListener('mouseup', () => {
  if(isDragging) {
    isDragging = false;
    els.previewBox.style.display = 'none';
  }
});

function seek(e) {
  if(!state.ytPlayer || state.duration <= 0) return;
  
  const rect = els.progressBar.getBoundingClientRect();
  let pos = (e.clientX - rect.left) / rect.width;
  pos = Math.max(0, Math.min(1, pos)); // Clamp 0-1
  
  const seekTime = pos * state.duration;
  
  // Visual update immediately
  els.playedBar.style.width = `${pos * 100}%`;
  els.scrubber.style.left = `${pos * 100}%`;
  els.currTime.textContent = formatTime(seekTime);
  
  // Actual seek
  state.ytPlayer.seekTo(seekTime, true);
}

// 5. Timeline Preview (Thumbnail Hover)
els.progressBar.addEventListener('mousemove', (e) => {
  const rect = els.progressBar.getBoundingClientRect();
  let pos = (e.clientX - rect.left) / rect.width;
  pos = Math.max(0, Math.min(1, pos));
  
  const time = pos * state.duration;
  
  els.previewBox.style.display = 'block';
  els.previewBox.style.left = `${pos * 100}%`;
  els.previewTime.textContent = formatTime(time);
  
  // Generate HQ Thumbnail for preview
  // Using current video ID
  const vidId = state.ytPlayer ? state.ytPlayer.getVideoData().video_id : '';
  // Use maxresdefault for better quality preview
  els.previewImg.src = `https://img.youtube.com/vi/${vidId}/mqdefault.jpg`; 
});

els.progressBar.addEventListener('mouseleave', () => {
  els.previewBox.style.display = 'none';
});

// 6. Volume
els.volSlider.addEventListener('input', (e) => {
  if(state.ytPlayer) state.ytPlayer.setVolume(e.target.value * 100);
});

// 7. Fullscreen
els.btnFull.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    els.wrapper.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
});

// --- HELPERS ---

function playNext() {
  if(state.filtered.length === 0) return;
  let nextIndex = state.currentIndex + 1;
  if(nextIndex >= state.filtered.length) nextIndex = 0;
  loadVideoState(nextIndex);
}

function renderPlaylist() {
  els.playlist.innerHTML = '';
  state.filtered.forEach((vid, idx) => {
    const div = document.createElement('div');
    div.className = "flex gap-3 p-2 hover:bg-gray-800 rounded-lg cursor-pointer transition-colors group";
    div.dataset.index = idx;
    div.onclick = () => loadVideoState(idx);
    
    div.innerHTML = `
      <div class="relative w-32 h-20 flex-shrink-0 bg-gray-900 rounded-md overflow-hidden">
        <img src="${vid.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
        <span class="absolute bottom-1 right-1 bg-black/80 text-[10px] px-1 rounded text-white">${vid.duration || '0:00'}</span>
      </div>
      <div class="flex flex-col justify-center">
        <h4 class="text-sm font-semibold text-gray-200 line-clamp-2 leading-snug group-hover:text-red-400 transition-colors">${vid.title}</h4>
        <p class="text-xs text-gray-500 mt-1">Video ${idx + 1}</p>
      </div>
    `;
    els.playlist.appendChild(div);
  });
}

function highlightPlaylistItem(index) {
  const items = els.playlist.children;
  for(let item of items) {
    item.classList.remove('bg-gray-800', 'ring-1', 'ring-red-500');
    if(parseInt(item.dataset.index) === index) {
      item.classList.add('bg-gray-800', 'ring-1', 'ring-red-500');
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
}

function formatTime(seconds) {
  if(!seconds || isNaN(seconds)) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

// Load YouTube IFrame API dynamically
function loadYouTubeAPI(callback) {
  const tag = document.createElement('script');
  tag.src = YOUTUBE_IFRAME_API;
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  tag.onload = callback;
}

// Search Filter
document.getElementById('search').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  state.filtered = state.videos.filter(v => v.title.toLowerCase().includes(term));
  renderPlaylist();
  // Don't auto-change playing video, just update list
});

// Start
init();

</script>
</body>
</html>
