<style>
  /* --- THEME VARIABLES --- */
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: rgba(240, 240, 240, 0.7);
    --glass-border: rgba(0, 0, 0, 0.1);
    --text-main: #0f0f0f;
    --text-muted: #606060;
    --accent: #ff0000; 
    --accent-hover: #cc0000;
    --control-bg: rgba(255, 255, 255, 0.2);
    --shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
  }

  /* NEW YORK DARK MODE */
  body.theme-ny-dark {
    --bg-primary: #000000;
    --bg-secondary: rgba(20, 20, 20, 0.6);
    --glass-border: rgba(255, 255, 255, 0.15);
    --text-main: #ffffff;
    --text-muted: #aaaaaa;
    --accent: #ff0000;
    --accent-hover: #ff3333;
    --control-bg: rgba(0, 0, 0, 0.6);
    --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
  }

  /* SYSTEM DEFAULT (Auto) - Uses Media Query logic in JS, but defaults here to light */
  @media (prefers-color-scheme: dark) {
    body:not(.theme-ny-dark):not(.theme-white) {
        --bg-primary: #0f0f0f;
        --bg-secondary: rgba(39, 39, 39, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #ffffff;
        --text-muted: #aaaaaa;
        --accent: #ff0000;
        --accent-hover: #ff3333;
        --control-bg: rgba(0, 0, 0, 0.6);
        --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
  }

  /* Global Styles */
  body { 
    background-color: var(--bg-primary); 
    color: var(--text-main); 
    font-family: 'Inter', sans-serif; 
    transition: background-color 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
  }
  
  /* Glassmorphism Classes */
  .glass-panel {
    background: var(--bg-secondary);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; opacity: 0.5; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Player Layout */
  .player-container {
    background-color: #000; 
    position: relative;
    overflow: hidden;
    user-select: none; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  #yt-api-div {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10;
    pointer-events: none;
  }
  
  /* Custom Controls */
  .custom-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    padding: 20px 15px 15px 15px;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 50; 
    pointer-events: none; 
    backdrop-filter: blur(2px);
  }

  .player-container:hover .custom-controls,
  .player-container.paused .custom-controls,
  .custom-controls:hover {
    opacity: 1;
    pointer-events: auto;
  }

  /* Progress Bar */
  .progress-container {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    position: relative;
    border-radius: 2px;
    transition: height 0.1s;
  }
  .progress-container:hover { height: 6px; }

  .progress-buffered {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: rgba(255,255,255,0.4);
    width: 0%; border-radius: 2px; pointer-events: none;
  }
  .progress-played {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: var(--accent);
    width: 0%; border-radius: 2px; pointer-events: none;
    box-shadow: 0 0 10px var(--accent);
  }

  .scrubber-handle {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%; left: 0%;
    opacity: 0; transition: opacity 0.15s ease-out, transform 0.1s;
    pointer-events: none;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
    z-index: 55;
  }

  .player-container:hover .scrubber-handle { opacity: 0 !important; }
  .progress-container:hover .scrubber-handle { opacity: 1 !important; transform: translate(-50%, -50%) scale(1.2); }

  /* Timeline Preview */
  .timeline-preview {
    position: absolute; bottom: 30px; transform: translateX(-50%);
    background: var(--bg-primary); border: 1px solid var(--glass-border);
    border-radius: 8px; overflow: hidden;
    display: none; pointer-events: none; z-index: 60;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .timeline-preview img { width: 160px; height: 90px; object-fit: cover; display: block; }
  .timeline-time { text-align: center; font-size: 11px; padding: 4px; background: var(--bg-secondary); color: var(--text-main); font-weight: bold; }

  /* Start Overlay */
  .start-overlay {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 40; transition: opacity 0.3s;
    background-color: #000;
  }
  .start-overlay::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.4); transition: background 0.3s;
    backdrop-filter: blur(0px);
  }
  .start-overlay:hover::before { backdrop-filter: blur(2px); background: rgba(0,0,0,0.2); }
  
  .center-btn-container {
    position: relative; width: 68px; height: 48px;
    z-index: 41; display: flex; align-items: center; justify-content: center;
  }

  .loader-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-left-color: var(--accent);
    border-radius: 50%; animation: spin 1s linear infinite;
    position: absolute;
  }

  .big-play-btn {
    width: 68px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 30px var(--accent);
    opacity: 0; transform: scale(0.8);
  }
  
  .start-overlay.ready .loader-spinner { display: none; }
  .start-overlay.ready .big-play-btn { opacity: 1; transform: scale(1); }
  .start-overlay.ready:hover .big-play-btn { transform: scale(1.1); filter: brightness(1.2); }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .line-clamp-2 {
    display: -webkit-box; --webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  
  /* Mobile Adjustments */
  @media (max-width: 768px) {
    .custom-controls { padding-bottom: 10px; }
    .timeline-preview { display: none !important; } /* Hide preview on mobile to save resources */
  }
</style>

<!-- SCRIPTS -->
<script>
// --- CONFIGURATION ---
const API_URL = "http://localhost:5000/api/videos"; 

// --- STATE ---
let state = {
  videos: [],
  filtered: [],
  currentIndex: 0,
  isPlaying: false,
  ytPlayer: null,
  updateInterval: null,
  duration: 0,
  currentVideoId: '',
  isPlayerReady: false
};

// --- DOM ELEMENTS ---
const els = {
  title: document.getElementById('video-title'),
  playlist: document.getElementById('playlist'),
  startOverlay: document.getElementById('start-overlay'),
  wrapper: document.getElementById('player-wrapper'),
  videoCount: document.getElementById('video-count'),
  
  // Controls
  btnPlay: document.getElementById('btn-play'),
  iconPlay: document.getElementById('icon-play'),
  iconPause: document.getElementById('icon-pause'),
  progressBar: document.getElementById('progress-bar'),
  playedBar: document.getElementById('played-bar'),
  bufferedBar: document.getElementById('buffered-bar'),
  scrubber: document.getElementById('scrubber'),
  currTime: document.getElementById('current-time'),
  durTime: document.getElementById('duration'),
  btnFull: document.getElementById('btn-fullscreen'),
  
  // Preview
  previewBox: document.getElementById('timeline-preview'),
  previewImg: document.getElementById('preview-img'),
  previewTime: document.getElementById('preview-time'),

  // Share Modal
  shareModal: document.getElementById('share-modal'),
  shareModalContent: document.getElementById('share-modal-content'),
  shareUrlInput: document.getElementById('share-url')
};

// --- THEME LOGIC ---
function setTheme(themeName) {
  // Remove existing theme classes
  document.body.classList.remove('theme-ny-dark', 'theme-white');
  
  if (themeName === 'ny-dark') {
    document.body.classList.add('theme-ny-dark');
    localStorage.setItem('theme', 'ny-dark');
  } else if (themeName === 'white') {
    document.body.classList.add('theme-white');
    localStorage.setItem('theme', 'white');
  } else {
    // System Default (remove specific classes, let CSS media query handle it)
    localStorage.removeItem('theme');
  }
}

// Initialize Theme from LocalStorage or System
(function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme) {
    setTheme(savedTheme);
  }
})();

// --- NAVIGATION ---
function goHome() {
  // Clear ID param and reload to show first video or reset state
  window.location.href = window.location.pathname;
}

// --- INITIALIZATION ---
async function init() {
  try {
    const res = await fetch(API_URL);
    
    if (!res.ok) throw new Error(`API Status: ${res.status}`);
    
    const data = await res.json();
    
    if (!Array.isArray(data.videos) || data.videos.length === 0) {
      throw new Error('No videos found');
    }
    
    state.videos = data.videos;
    state.filtered = [...state.videos];
    
    renderPlaylist();
    
    // CHECK URL FOR ID REDIRECTION
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id');
    
    let startIndex = 0;
    if (videoId) {
      const foundIndex = state.filtered.findIndex(v => v.id === videoId);
      if (foundIndex !== -1) startIndex = foundIndex;
    }
    
    loadVideoState(startIndex);
    
  } catch (err) {
    console.error("Init Error:", err);
    showErrorState(err.message);
  }
}

function showErrorState(message) {
  els.title.textContent = 'Error Loading Videos';
  els.playlist.innerHTML = `
    <div class="flex flex-col items-center justify-center h-full text-[var(--text-muted)] p-8">
      <i class="fa-solid fa-triangle-exclamation text-4xl mb-4 text-[var(--accent)]"></i>
      <p class="text-center font-medium">Unable to connect</p>
      <p class="text-sm mt-2 opacity-70">${message}</p>
      <button onclick="location.reload()" class="mt-4 bg-[var(--accent)] hover:opacity-90 text-white px-6 py-2 rounded-lg transition-opacity">
        Retry
      </button>
    </div>
  `;
  els.videoCount.textContent = '0 videos';
}

// --- CORE LOGIC ---

function loadVideoState(index) {
  state.currentIndex = index;
  const video = state.filtered[index];
  if(!video) return;

  state.currentVideoId = video.id;
  state.isPlayerReady = false;

  // Update URL without reloading
  const newUrl = `${window.location.pathname}?id=${video.id}`;
  window.history.pushState({ path: newUrl }, '', newUrl);

  // Update UI Text
  els.title.textContent = video.title;
  document.title = `${video.title} | StreamPro`;
  
  // Reset Player State
  stopUpdateLoop();
  state.isPlaying = false;
  updatePlayIcon();
  
  // RESET OVERLAY
  els.startOverlay.classList.remove('ready');
  els.startOverlay.style.display = 'flex';
  els.startOverlay.style.backgroundImage = `url('${video.thumbnail}')`;
  
  highlightPlaylistItem(index);
  setupYouTubePlayer(video.id);
}

function setupYouTubePlayer(videoId) {
  if (!window.YT || !window.YT.Player) {
    loadYouTubeAPI(() => setupYouTubePlayer(videoId));
    return;
  }

  if (state.ytPlayer) state.ytPlayer.destroy();

  let oldDiv = document.getElementById('yt-api-div');
  if(oldDiv) oldDiv.remove();
  
  let ytDiv = document.createElement('div');
  ytDiv.id = 'yt-api-div';
  els.wrapper.appendChild(ytDiv);

  state.ytPlayer = new YT.Player('yt-api-div', {
    height: '100%',
    width: '100%',
    videoId: videoId,
    playerVars: {
      'autoplay': 0,
      'controls': 0,
      'rel': 0,
      'modestbranding': 1,
      'fs': 0,
      'iv_load_policy': 3
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  state.duration = event.target.getDuration();
  els.durTime.textContent = formatTime(state.duration);
  event.target.setVolume(100);
  state.isPlayerReady = true;
  els.startOverlay.classList.add('ready');
}

function onPlayerStateChange(event) {
  if (event.data == YT.PlayerState.PLAYING) {
    state.isPlaying = true;
    els.startOverlay.style.display = 'none';
    els.wrapper.classList.remove('paused');
    if(state.ytPlayer) state.ytPlayer.setVolume(100);
    startUpdateLoop();
  } else {
    state.isPlaying = false;
    els.wrapper.classList.add('paused');
    stopUpdateLoop();
  }
  updatePlayIcon();
}

// --- INTERACTION ---

els.startOverlay.addEventListener('click', () => {
  if(state.isPlayerReady && state.ytPlayer) {
    state.ytPlayer.playVideo();
    state.ytPlayer.setVolume(100);
  }
});

els.btnPlay.addEventListener('click', togglePlay);

function togglePlay() {
  if(!state.ytPlayer) return;
  if(state.isPlaying) {
    state.ytPlayer.pauseVideo();
  } else {
    if(els.startOverlay.style.display !== 'none') {
       els.startOverlay.click();
    } else {
       state.ytPlayer.playVideo();
       state.ytPlayer.setVolume(100);
    }
  }
}

function updatePlayIcon() {
  if(state.isPlaying) {
    els.iconPlay.classList.add('hidden');
    els.iconPause.classList.remove('hidden');
  } else {
    els.iconPlay.classList.remove('hidden');
    els.iconPause.classList.add('hidden');
  }
}

// --- PROGRESS & TIME ---

function startUpdateLoop() {
  state.updateInterval = setInterval(() => {
    if(!state.ytPlayer || !state.isPlaying) return;
    
    const currentTime = state.ytPlayer.getCurrentTime();
    const duration = state.ytPlayer.getDuration();
    
    if(duration > 0) {
      const percent = (currentTime / duration) * 100;
      els.playedBar.style.width = `${percent}%`;
      els.scrubber.style.left = `${percent}%`;
      els.currTime.textContent = formatTime(currentTime);
    }
  }, 500);
}

function stopUpdateLoop() {
  clearInterval(state.updateInterval);
}

// Scrubbing
let isDragging = false;

els.progressBar.addEventListener('mousedown', (e) => { isDragging = true; seek(e); });
els.progressBar.addEventListener('touchstart', (e) => { isDragging = true; seek(e.touches[0]); }, {passive: false});

document.addEventListener('mousemove', (e) => { if(isDragging) seek(e); handlePreviewHover(e); });
document.addEventListener('touchmove', (e) => { if(isDragging) seek(e.touches[0]); }, {passive: false});

document.addEventListener('mouseup', () => { isDragging = false; els.previewBox.style.display = 'none'; });
document.addEventListener('touchend', () => { isDragging = false; els.previewBox.style.display = 'none'; });

function seek(e) {
  if(!state.ytPlayer || state.duration <= 0) return;
  
  const rect = els.progressBar.getBoundingClientRect();
  let clientX = e.clientX;
  // Basic touch support fallback if needed, though touch event passes modified obj
  
  let pos = (clientX - rect.left) / rect.width;
  pos = Math.max(0, Math.min(1, pos));
  
  const seekTime = pos * state.duration;
  
  els.playedBar.style.width = `${pos * 100}%`;
  els.scrubber.style.left = `${pos * 100}%`;
  els.currTime.textContent = formatTime(seekTime);
  
  state.ytPlayer.seekTo(seekTime, true);
}

// Preview Hover
function handlePreviewHover(e) {
  if(!state.currentVideoId || window.innerWidth < 768) return; // Disable on mobile
  
  const rect = els.progressBar.getBoundingClientRect();
  if (e.clientY >= rect.top - 20 && e.clientY <= rect.bottom + 20) {
    let pos = (e.clientX - rect.left) / rect.width;
    pos = Math.max(0, Math.min(1, pos));
    
    const time = pos * state.duration;
    
    els.previewBox.style.display = 'block';
    els.previewBox.style.left = `${pos * 100}%`;
    els.previewTime.textContent = formatTime(time);
    els.previewImg.src = `https://img.youtube.com/vi/${state.currentVideoId}/mqdefault.jpg`; 
  } else {
    els.previewBox.style.display = 'none';
  }
}

// Fullscreen
els.btnFull.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    els.wrapper.requestFullscreen().catch(err => console.error(err));
  } else {
    document.exitFullscreen();
  }
});

// --- SHARE MODAL ---
function openShareModal() {
  const url = window.location.href;
  els.shareUrlInput.value = url;
  els.shareModal.classList.remove('hidden');
  // Small delay for animation
  setTimeout(() => {
    els.shareModal.classList.remove('opacity-0');
    els.shareModalContent.classList.remove('scale-95');
    els.shareModalContent.classList.add('scale-100');
  }, 10);
}

function closeShareModal() {
  els.shareModal.classList.add('opacity-0');
  els.shareModalContent.classList.remove('scale-100');
  els.shareModalContent.classList.add('scale-95');
  setTimeout(() => els.shareModal.classList.add('hidden'), 300);
}

function copyShareLink() {
  els.shareUrlInput.select();
  navigator.clipboard.writeText(els.shareUrlInput.value).then(() => {
    const btn = document.querySelector('#share-modal button.bg-\\[var\\(--accent\\)\\]');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
    setTimeout(() => btn.innerHTML = originalHTML, 2000);
  });
}

els.shareModal.addEventListener('click', (e) => { if (e.target === els.shareModal) closeShareModal(); });

// --- HELPERS ---

// Format Time: H:MM:SS or M:SS
function formatTime(seconds) {
  if(!seconds || isNaN(seconds)) return "0:00";
  
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  
  const sStr = s < 10 ? '0' + s : s;
  const mStr = m < 10 ? '0' + m : m;

  if (h > 0) {
    return `${h}:${mStr}:${sStr}`;
  }
  return `${m}:${sStr}`;
}

function renderPlaylist() {
  els.playlist.innerHTML = '';
  state.filtered.forEach((vid, idx) => {
    const div = document.createElement('div');
    div.className = "flex gap-3 p-2 hover:bg-[var(--glass-border)] rounded-lg cursor-pointer transition-colors group border border-transparent hover:border-[var(--glass-border)]";
    div.dataset.index = idx;
    div.onclick = () => loadVideoState(idx);
    
    div.innerHTML = `
      <div class="relative w-32 h-20 flex-shrink-0 bg-gray-900 rounded-md overflow-hidden ring-1 ring-[var(--glass-border)]">
        <img src="${vid.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
        <span class="absolute bottom-1 right-1 bg-black/80 text-[10px] px-1 rounded text-white font-mono">${vid.duration || '0:00'}</span>
      </div>
      <div class="flex flex-col justify-center min-w-0">
        <h4 class="text-sm font-semibold text-[var(--text-main)] line-clamp-2 leading-snug group-hover:text-[var(--accent)] transition-colors">${vid.title}</h4>
        <!-- No numbering as requested -->
      </div>
    `;
    els.playlist.appendChild(div);
  });
  els.videoCount.textContent = `${state.filtered.length} videos`;
}

function highlightPlaylistItem(index) {
  const items = els.playlist.children;
  for(let item of items) {
    item.classList.remove('bg-[var(--glass-border)]', 'ring-1', 'ring-[var(--accent)]');
    if(parseInt(item.dataset.index) === index) {
      item.classList.add('bg-[var(--glass-border)]', 'ring-1', 'ring-[var(--accent)]');
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
}

function loadYouTubeAPI(callback) {
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  tag.onload = callback;
}

// Search Filter Logic (Desktop & Mobile)
const handleSearch = (e) => {
  const term = e.target.value.toLowerCase();
  state.filtered = state.videos.filter(v => v.title.toLowerCase().includes(term));
  renderPlaylist();
};

document.getElementById('search').addEventListener('input', handleSearch);
document.getElementById('search-mobile').addEventListener('input', handleSearch);

// Start App
init();

</script>
