<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Stream Player</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'yt-black': '#0f0f0f',
          'yt-dark': '#272727',
          'yt-gray': '#aaaaaa',
          'yt-red': '#ff0000'
        }
      }
    }
  }
</script>

<!-- Video.js CSS (Used for structure, but customized heavily) -->
<link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  body { background-color: #0f0f0f; color: white; font-family: 'Inter', sans-serif; }
  
  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0f0f0f; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* --- PLAYER LAYOUT & Z-INDEX FIXES --- */
  .player-container {
    background-color: #000;
    position: relative;
    overflow: hidden;
  }

  /* The Video.js wrapper */
  .video-js {
    width: 100%;
    height: 100%;
    background-color: #000 !important;
  }
  
  /* THE YOUTUBE IFRAME - INVISIBLE BUT INTERACTIVE */
  .vjs-tech {
    object-fit: contain;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0; /* COMPLETELY HIDE YT UI */
    z-index: 10;
  }

  /* Custom Control Bar Styling */
  .custom-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 20px 15px 15px 15px;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 50; /* Above Video */
    pointer-events: none; 
  }

  /* Show controls on hover or pause */
  .player-container:hover .custom-controls,
  .player-container.paused .custom-controls,
  .custom-controls:hover {
    opacity: 1;
    pointer-events: auto;
  }

  /* FIX: Prevent scrubber from showing on general player hover */
  .player-container:hover .scrubber-handle {
    opacity: 0 !important;
  }

  /* Only show scrubber when specifically hovering progress bar */
  .progress-container:hover .scrubber-handle {
    opacity: 1 !important;
  }

  /* Progress Bar Container */
  .progress-container {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    position: relative;
    border-radius: 2px;
    transition: height 0.1s;
  }
  .progress-container:hover { height: 6px; }

  .progress-buffered {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: rgba(255,255,255,0.3);
    width: 0%;
    border-radius: 2px;
    pointer-events: none;
  }
  .progress-played {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: #ff0000;
    width: 0%;
    border-radius: 2px;
    pointer-events: none;
  }

  .scrubber-handle {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px;
    height: 12px;
    background: #ff0000;
    border-radius: 50%;
    left: 0%;
    opacity: 0;
    transition: opacity 0.15s ease-out;
    pointer-events: none;
    box-shadow: 0 0 6px rgba(255, 0, 0, 0.6);
    z-index: 55;
  }

  /* Timeline Preview Tooltip */
  .timeline-preview {
    position: absolute;
    bottom: 25px;
    transform: translateX(-50%);
    background: #000;
    border: 1px solid #333;
    border-radius: 4px;
    overflow: hidden;
    display: none;
    pointer-events: none;
    z-index: 60;
    box-shadow: 0 4px 15px rgba(0,0,0,0.8);
  }
  .timeline-preview img {
    width: 160px;
    height: 90px;
    object-fit: cover;
    display: block;
  }
  .timeline-time {
    text-align: center;
    font-size: 11px;
    padding: 4px;
    background: #111;
    color: white;
    font-weight: bold;
  }

  /* Start Overlay (Thumbnail + Loader/Play Btn) */
  .start-overlay {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 40; /* Above Invisible Video */
    transition: opacity 0.3s;
    background-color: #000;
  }
  .start-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    transition: background 0.3s;
  }
  .start-overlay:hover::before { background: rgba(0,0,0,0.1); }
  
  /* The Central Button Container */
  .center-btn-container {
    position: relative;
    width: 68px;
    height: 48px;
    z-index: 41;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* LOADER SPINNER */
  .loader-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-left-color: #ff0000;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    position: absolute;
  }

  /* BIG PLAY BUTTON */
  .big-play-btn {
    width: 68px;
    height: 48px;
    background: rgba(255, 0, 0, 0.9);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
    opacity: 0; /* Hidden by default */
    transform: scale(0.8);
    transition: all 0.3s ease;
  }
  
  /* State: When Ready to Play */
  .start-overlay.ready .loader-spinner { display: none; }
  .start-overlay.ready .big-play-btn { 
    opacity: 1; 
    transform: scale(1);
  }
  .start-overlay.ready:hover .big-play-btn { 
    transform: scale(1.1); 
    background: #ff0000;
  }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
</head>
<body class="antialiased min-h-screen flex flex-col">

<!-- HEADER -->
<div class="sticky top-0 z-50 bg-[#0f0f0f]/95 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center justify-between gap-4">
  <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
    <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-bold">▶</div>
    <h1 class="text-xl font-bold tracking-tight">Stream<span class="text-red-500">Pro</span></h1>
  </div>

  <div class="flex-1 max-w-xl relative hidden sm:block">
    <input id="search" type="text" placeholder="Search videos..." 
      class="w-full bg-[#1a1a1a] border border-gray-700 text-sm rounded-full px-4 py-2 focus:outline-none focus:border-red-500 transition-colors pl-10 text-white">
    <svg class="w-4 h-4 text-gray-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
  </div>

  <button onclick="playNext()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-full text-sm font-medium transition-colors flex items-center gap-2">
    Next <i class="fa-solid fa-forward text-xs"></i>
  </button>
</div>

<!-- MAIN CONTENT -->
<div class="flex-1 max-w-[1600px] mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 w-full">

  <!-- PLAYER SECTION (Left) -->
  <div class="lg:col-span-2 space-y-4">
    
    <!-- CUSTOM PLAYER CONTAINER -->
    <div id="player-wrapper" class="player-container paused relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl group select-none ring-1 ring-gray-800">
      
      <!-- Start Overlay (Thumbnail + Logic based Button) -->
      <div id="start-overlay" class="start-overlay" style="background-image: url('');">
        <div class="center-btn-container">
          <!-- State 1: Loader -->
          <div class="loader-spinner"></div>
          <!-- State 2: Play Button (Hidden initially) -->
          <div class="big-play-btn">
            <i class="fa-solid fa-play text-white text-xl ml-1"></i>
          </div>
        </div>
      </div>

      <!-- Video Element (Invisible YouTube Iframe lives here) -->
      <video id="my-video" class="video-js vjs-default-skin w-full h-full" preload="none">
        <p class="vjs-no-js">To view this video please enable JavaScript.</p>
      </video>

      <!-- Custom Controls -->
      <div class="custom-controls">
        
        <!-- Progress Bar Area -->
        <div class="relative w-full group/progress">
          <!-- Timeline Preview Popup -->
          <div id="timeline-preview" class="timeline-preview">
            <img id="preview-img" src="" alt="Preview">
            <div id="preview-time" class="timeline-time">00:00</div>
          </div>

          <div class="progress-container" id="progress-bar">
            <div class="progress-buffered" id="buffered-bar"></div>
            <div class="progress-played" id="played-bar"></div>
            <div class="scrubber-handle" id="scrubber"></div>
          </div>
        </div>

        <!-- Buttons Row -->
        <div class="flex items-center justify-between mt-1">
          <div class="flex items-center gap-4">
            <!-- Play/Pause -->
            <button id="btn-play" class="hover:text-red-500 transition-colors text-white">
              <i id="icon-play" class="fa-solid fa-play text-xl"></i>
              <i id="icon-pause" class="fa-solid fa-pause text-xl hidden"></i>
            </button>

            <!-- Volume -->
            <div class="flex items-center gap-2 group/vol">
              <button id="btn-mute" class="hover:text-white text-gray-300">
                <i class="fa-solid fa-volume-high text-lg"></i>
              </button>
              <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="1" class="w-0 overflow-hidden group-hover/vol:w-20 transition-all duration-300 h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-red-500">
            </div>

            <!-- Time Display -->
            <div class="text-xs font-medium text-gray-300 font-mono">
              <span id="current-time">0:00</span> / <span id="duration">0:00</span>
            </div>
          </div>

          <div class="flex items-center gap-3">
             <!-- Fullscreen -->
             <button id="btn-fullscreen" class="hover:text-white text-gray-300">
               <i class="fa-solid fa-expand text-lg"></i>
             </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Video Info & Share -->
    <div>
      <h2 id="video-title" class="text-xl lg:text-2xl font-bold leading-tight mb-2 text-white">Loading...</h2>
      <div class="flex items-center justify-between text-sm text-gray-400 border-b border-gray-800 pb-4">
        <div class="flex items-center gap-2">
           <span class="bg-gray-800 px-2 py-1 rounded text-xs text-gray-300">YouTube Source</span>
        </div>
        <!-- SHARE BUTTON -->
        <button onclick="openShareModal()" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-full transition-colors">
          <i class="fa-solid fa-share"></i> Share
        </button>
      </div>
    </div>

  </div>

  <!-- PLAYLIST (Right) -->
  <div class="lg:col-span-1">
    <div class="bg-[#121212] rounded-xl border border-gray-800 h-[calc(100vh-120px)] flex flex-col sticky top-24">
      <div class="p-4 border-b border-gray-800 flex justify-between items-center">
        <h3 class="font-bold text-lg text-white">Up Next</h3>
        <span id="video-count" class="text-xs text-gray-500">0 videos</span>
      </div>
      <div id="playlist" class="flex-1 overflow-y-auto p-2 space-y-2">
        <!-- Items injected via JS -->
      </div>
    </div>
  </div>

</div>

<!-- SHARE MODAL POPUP -->
<div id="share-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
  <div class="bg-[#1e1e1e] p-6 rounded-2xl shadow-2xl w-full max-w-md transform scale-95 transition-transform duration-300 border border-gray-700" id="share-modal-content">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-white">Share Video</h3>
      <button onclick="closeShareModal()" class="text-gray-400 hover:text-white">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>
    
    <div class="mb-4">
      <label class="block text-xs text-gray-400 mb-1">Video Link</label>
      <div class="flex gap-2">
        <input type="text" id="share-url" readonly class="w-full bg-black border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-red-500">
        <button onclick="copyShareLink()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
          Copy
        </button>
      </div>
    </div>
    
    <div class="flex justify-end">
       <button onclick="closeShareModal()" class="text-sm text-gray-400 hover:text-white">Close</button>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<!-- Video.js Core -->
<script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>

<script>
// --- CONFIGURATION ---
const API_URL = "http://localhost:5000/api/videos"; 

// --- STATE ---
let state = {
  videos: [],
  filtered: [],
  currentIndex: 0,
  isPlaying: false,
  ytPlayer: null,
  updateInterval: null,
  duration: 0,
  currentVideoId: '',
  isPlayerReady: false
};

// --- DOM ELEMENTS ---
const els = {
  title: document.getElementById('video-title'),
  playlist: document.getElementById('playlist'),
  startOverlay: document.getElementById('start-overlay'),
  videoTag: document.getElementById('my-video'),
  wrapper: document.getElementById('player-wrapper'),
  videoCount: document.getElementById('video-count'),
  
  // Controls
  btnPlay: document.getElementById('btn-play'),
  iconPlay: document.getElementById('icon-play'),
  iconPause: document.getElementById('icon-pause'),
  progressBar: document.getElementById('progress-bar'),
  playedBar: document.getElementById('played-bar'),
  bufferedBar: document.getElementById('buffered-bar'),
  scrubber: document.getElementById('scrubber'),
  currTime: document.getElementById('current-time'),
  durTime: document.getElementById('duration'),
  volSlider: document.getElementById('vol-slider'),
  btnFull: document.getElementById('btn-fullscreen'),
  
  // Preview
  previewBox: document.getElementById('timeline-preview'),
  previewImg: document.getElementById('preview-img'),
  previewTime: document.getElementById('preview-time'),

  // Share Modal
  shareModal: document.getElementById('share-modal'),
  shareModalContent: document.getElementById('share-modal-content'),
  shareUrlInput: document.getElementById('share-url')
};

// --- INITIALIZATION ---
async function init() {
  try {
    const res = await fetch(API_URL);
    
    if (!res.ok) {
      throw new Error(`API responded with status: ${res.status}`);
    }
    
    const data = await res.json();
    
    if (!Array.isArray(data.videos) || data.videos.length === 0) {
      throw new Error('No videos found in API response');
    }
    
    state.videos = data.videos;
    state.filtered = [...state.videos];
    
    renderPlaylist();
    
    // CHECK URL FOR ID REDIRECTION
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id');
    
    let startIndex = 0;
    if (videoId) {
      const foundIndex = state.filtered.findIndex(v => v.id === videoId);
      if (foundIndex !== -1) {
        startIndex = foundIndex;
      }
    }
    
    loadVideoState(startIndex);
    
  } catch (err) {
    console.error("Failed to load videos from API:", err);
    showErrorState(err.message);
  }
}

function showErrorState(message) {
  els.title.textContent = 'Error Loading Videos';
  els.playlist.innerHTML = `
    <div class="flex flex-col items-center justify-center h-full text-gray-400 p-8">
      <i class="fa-solid fa-exclamation-triangle text-4xl mb-4 text-red-500"></i>
      <p class="text-center font-medium">Unable to load videos</p>
      <p class="text-sm mt-2 text-gray-500">${message}</p>
      <button onclick="location.reload()" class="mt-4 bg-red-600 hover:bg-red-700 px-6 py-2 rounded-lg transition-colors">
        Retry
      </button>
    </div>
  `;
  els.videoCount.textContent = '0 videos';
}

// --- CORE LOGIC ---

function loadVideoState(index) {
  state.currentIndex = index;
  const video = state.filtered[index];
  if(!video) return;

  state.currentVideoId = video.id;
  state.isPlayerReady = false;

  // Update URL without reloading
  const newUrl = `${window.location.pathname}?id=${video.id}`;
  window.history.pushState({ path: newUrl }, '', newUrl);

  // Update UI Text
  els.title.textContent = video.title;
  document.title = `${video.title} | StreamPro`;
  
  // Reset Player State
  stopUpdateLoop();
  state.isPlaying = false;
  updatePlayIcon();
  
  // RESET OVERLAY TO LOADING STATE
  els.startOverlay.classList.remove('ready'); // Shows Spinner, Hides Play Btn
  els.startOverlay.style.display = 'flex';
  els.startOverlay.style.backgroundImage = `url('${video.thumbnail}')`;
  
  // Highlight Playlist
  highlightPlaylistItem(index);
  
  // Prepare YouTube Player
  setupYouTubePlayer(video.id);
}

function setupYouTubePlayer(videoId) {
  if (!window.YT || !window.YT.Player) {
    loadYouTubeAPI(() => setupYouTubePlayer(videoId));
    return;
  }

  if (state.ytPlayer) {
    state.ytPlayer.destroy();
  }

  let ytDiv = document.getElementById('yt-api-div');
  if(!ytDiv) {
    ytDiv = document.createElement('div');
    ytDiv.id = 'yt-api-div';
    ytDiv.className = 'absolute inset-0 z-10 w-full h-full'; 
    els.wrapper.appendChild(ytDiv);
  }

  state.ytPlayer = new YT.Player('yt-api-div', {
    height: '100%',
    width: '100%',
    videoId: videoId,
    playerVars: {
      'autoplay': 0,
      'controls': 0, // Hide native controls
      'rel': 0,
      'modestbranding': 1,
      'fs': 0,
      'iv_load_policy': 3,
      'origin': window.location.origin
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  state.duration = event.target.getDuration();
  els.durTime.textContent = formatTime(state.duration);
  
  // SWITCH OVERLAY TO "PLAY BUTTON" STATE
  state.isPlayerReady = true;
  els.startOverlay.classList.add('ready');
}

function onPlayerStateChange(event) {
  if (event.data == YT.PlayerState.PLAYING) {
    state.isPlaying = true;
    
    // HIDE OVERLAY COMPLETELY WHEN PLAYING
    els.startOverlay.style.display = 'none';
    
    els.wrapper.classList.remove('paused');
    startUpdateLoop();
  } else {
    state.isPlaying = false;
    els.wrapper.classList.add('paused');
    stopUpdateLoop();
    
    // If paused manually, we might want to show overlay again? 
    // Usually modern players keep overlay hidden on pause unless you click out.
    // But for this request, let's keep it clean.
  }
  updatePlayIcon();
}

// --- USER INTERACTION ---

// 1. Click Thumbnail Overlay -> Play
els.startOverlay.addEventListener('click', () => {
  if(state.isPlayerReady && state.ytPlayer && typeof state.ytPlayer.playVideo === 'function') {
    state.ytPlayer.playVideo();
  }
});

// 2. Custom Play/Pause Button
els.btnPlay.addEventListener('click', togglePlay);

function togglePlay() {
  if(!state.ytPlayer) return;
  
  if(state.isPlaying) {
    state.ytPlayer.pauseVideo();
  } else {
    // If overlay is visible, trigger it
    if(els.startOverlay.style.display !== 'none') {
       els.startOverlay.click();
    } else {
       state.ytPlayer.playVideo();
    }
  }
}

function updatePlayIcon() {
  if(state.isPlaying) {
    els.iconPlay.classList.add('hidden');
    els.iconPause.classList.remove('hidden');
  } else {
    els.iconPlay.classList.remove('hidden');
    els.iconPause.classList.add('hidden');
  }
}

// 3. Progress Bar Logic
function startUpdateLoop() {
  state.updateInterval = setInterval(() => {
    if(!state.ytPlayer || !state.isPlaying) return;
    
    const currentTime = state.ytPlayer.getCurrentTime();
    const duration = state.ytPlayer.getDuration();
    
    if(duration > 0) {
      const percent = (currentTime / duration) * 100;
      els.playedBar.style.width = `${percent}%`;
      els.scrubber.style.left = `${percent}%`;
      els.currTime.textContent = formatTime(currentTime);
    }
  }, 500);
}

function stopUpdateLoop() {
  clearInterval(state.updateInterval);
}

// 4. Scrubbing
let isDragging = false;

els.progressBar.addEventListener('mousedown', (e) => {
  isDragging = true;
  seek(e);
});

document.addEventListener('mousemove', (e) => {
  if(isDragging) seek(e);
  handlePreviewHover(e);
});

document.addEventListener('mouseup', () => {
  if(isDragging) {
    isDragging = false;
    els.previewBox.style.display = 'none';
  }
});

function seek(e) {
  if(!state.ytPlayer || state.duration <= 0) return;
  
  const rect = els.progressBar.getBoundingClientRect();
  let pos = (e.clientX - rect.left) / rect.width;
  pos = Math.max(0, Math.min(1, pos));
  
  const seekTime = pos * state.duration;
  
  els.playedBar.style.width = `${pos * 100}%`;
  els.scrubber.style.left = `${pos * 100}%`;
  els.currTime.textContent = formatTime(seekTime);
  
  state.ytPlayer.seekTo(seekTime, true);
}

// 5. Timeline Preview
function handlePreviewHover(e) {
  if(!state.currentVideoId) return;
  
  const rect = els.progressBar.getBoundingClientRect();
  if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
    let pos = (e.clientX - rect.left) / rect.width;
    pos = Math.max(0, Math.min(1, pos));
    
    const time = pos * state.duration;
    
    els.previewBox.style.display = 'block';
    els.previewBox.style.left = `${pos * 100}%`;
    els.previewTime.textContent = formatTime(time);
    els.previewImg.src = `https://img.youtube.com/vi/${state.currentVideoId}/mqdefault.jpg`; 
  } else {
    els.previewBox.style.display = 'none';
  }
}

// 6. Volume
els.volSlider.addEventListener('input', (e) => {
  if(state.ytPlayer) state.ytPlayer.setVolume(e.target.value * 100);
});

// 7. Fullscreen
els.btnFull.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    els.wrapper.requestFullscreen().catch(err => {
      console.error(err);
    });
  } else {
    document.exitFullscreen();
  }
});

// --- SHARE MODAL FUNCTIONS ---
function openShareModal() {
  const url = window.location.href;
  els.shareUrlInput.value = url;
  
  els.shareModal.classList.remove('hidden');
  setTimeout(() => {
    els.shareModal.classList.remove('opacity-0');
    els.shareModalContent.classList.remove('scale-95');
    els.shareModalContent.classList.add('scale-100');
  }, 10);
}

function closeShareModal() {
  els.shareModal.classList.add('opacity-0');
  els.shareModalContent.classList.remove('scale-100');
  els.shareModalContent.classList.add('scale-95');
  
  setTimeout(() => {
    els.shareModal.classList.add('hidden');
  }, 300);
}

function copyShareLink() {
  els.shareUrlInput.select();
  els.shareUrlInput.setSelectionRange(0, 99999); // Mobile
  navigator.clipboard.writeText(els.shareUrlInput.value).then(() => {
    const btn = document.querySelector('#share-modal button.bg-red-600');
    const originalText = btn.innerText;
    btn.innerText = "Copied!";
    btn.classList.add('bg-green-600', 'hover:bg-green-700');
    btn.classList.remove('bg-red-600', 'hover:bg-red-700');
    
    setTimeout(() => {
      btn.innerText = originalText;
      btn.classList.remove('bg-green-600', 'hover:bg-green-700');
      btn.classList.add('bg-red-600', 'hover:bg-red-700');
    }, 2000);
  });
}

// Close modal on outside click
els.shareModal.addEventListener('click', (e) => {
  if (e.target === els.shareModal) closeShareModal();
});

// --- HELPERS ---

function playNext() {
  if(state.filtered.length === 0) return;
  let nextIndex = state.currentIndex + 1;
  if(nextIndex >= state.filtered.length) nextIndex = 0;
  loadVideoState(nextIndex);
}

function renderPlaylist() {
  els.playlist.innerHTML = '';
  state.filtered.forEach((vid, idx) => {
    const div = document.createElement('div');
    div.className = "flex gap-3 p-2 hover:bg-gray-800 rounded-lg cursor-pointer transition-colors group";
    div.dataset.index = idx;
    div.onclick = () => loadVideoState(idx);
    
    div.innerHTML = `
      <div class="relative w-32 h-20 flex-shrink-0 bg-gray-900 rounded-md overflow-hidden">
        <img src="${vid.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
        <span class="absolute bottom-1 right-1 bg-black/80 text-[10px] px-1 rounded text-white">${vid.duration || '0:00'}</span>
      </div>
      <div class="flex flex-col justify-center">
        <h4 class="text-sm font-semibold text-gray-200 line-clamp-2 leading-snug group-hover:text-white transition-colors">${vid.title}</h4>
        <p class="text-xs text-gray-500 mt-1">Video ${idx + 1}</p>
      </div>
    `;
    els.playlist.appendChild(div);
  });
  els.videoCount.textContent = `${state.filtered.length} videos`;
}

function highlightPlaylistItem(index) {
  const items = els.playlist.children;
  for(let item of items) {
    item.classList.remove('bg-gray-800', 'ring-1', 'ring-red-500');
    if(parseInt(item.dataset.index) === index) {
      item.classList.add('bg-gray-800', 'ring-1', 'ring-red-500');
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
}

function formatTime(seconds) {
  if(!seconds || isNaN(seconds)) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function loadYouTubeAPI(callback) {
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  tag.onload = callback;
}

// Search Filter
document.getElementById('search').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  state.filtered = state.videos.filter(v => v.title.toLowerCase().includes(term));
  renderPlaylist();
});

// Start
init();

</script>
</body>
