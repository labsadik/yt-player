<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone - Watch</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'yt-black': '#0f0f0f',
          'yt-dark': '#272727',
          'yt-gray': '#aaaaaa',
          'yt-red': '#ff0000'
        }
      }
    }
  }
</script>

<!-- Plyr CSS -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background-color: #0f0f0f; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  /* Player Container - Fixed 16:9 aspect ratio */
  #player-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* All layers fill container exactly */
  #player-wrapper > div[id] {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* Z-Index Layers:
     10: Skeleton (shimmer only)
     20: Thumbnail (with single loader/play button)
     30: Player (video)
  */

  @keyframes shimmer {
    0% { background-position: -1000px 0; }
    100% { background-position: 1000px 0; }
  }

  .skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #2d2d2d 50%, #1a1a1a 75%);
    background-size: 1000px 100%;
    animation: shimmer 2s infinite linear;
  }

  /* Layer 20: Thumbnail with Hover Play Button Feature */
  #thumb-preview {
    z-index: 20;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }

  /* ⭐ SINGLE LOADER: Spinner that transforms to Play Button on Hover */
  .thumb-loader {
    width: 56px;
    height: 56px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #ff0000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* HOVER STATE: Transform into Red Play Button */
  #thumb-preview:hover .thumb-loader {
    background: rgba(255, 0, 0, 0.95);
    border: none;
    animation: none;
    box-shadow: 0 8px 24px rgba(255, 0, 0, 0.5);
    transform: scale(1.1);
  }

  /* Spinner Icon (visible by default) */
  .spinner-icon {
    color: white;
    font-size: 24px;
    display: block;
  }

  /* Play Icon (hidden by default) */
  .play-icon {
    color: white;
    font-size: 24px;
    margin-left: 4px;
    display: none;
  }

  /* On hover: Hide spinner, show play icon */
  #thumb-preview:hover .spinner-icon {
    display: none;
  }

  #thumb-preview:hover .play-icon {
    display: block;
  }

  /* Seeking mode: Disable hover effect (show loader only) */
  #thumb-preview.seeking-mode:hover .thumb-loader {
    background: rgba(0,0,0,0.5);
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #ff0000;
    animation: spin 0.8s linear infinite;
    box-shadow: none;
    transform: scale(1);
  }

  #thumb-preview.seeking-mode:hover .spinner-icon {
    display: block;
  }

  #thumb-preview.seeking-mode:hover .play-icon {
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Layer 30: Player */
  #player-container {
    z-index: 30;
    background: #000;
  }

  /* ============================================
   * PLYR CUSTOMIZATION
   * 1. Hide default overlays (circular "C" loader)
   * 2. Auto-hide controls when playing
   * 3. Show controls on hover
   * ============================================ */
  .plyr {
    width: 100% !important;
    height: 100% !important;
    border-radius: 0 !important;
  }
  .plyr__video-wrapper,
  .plyr__video-embed {
    width: 100% !important;
    height: 100% !important;
  }

  /* ⭐ HIDE PLYR'S DEFAULT OVERLAYS (Fixes circular "C" loader!) */
  .plyr__control--overlaid {
    display: none !important; /* Hide big play button overlay */
  }

  .plyr__spinner {
    display: none !important; /* Hide Plyr's default circular spinner */
  }

  /* ⭐ AUTO-HIDE CONTROLS WHEN PLAYING */
  .plyr__controls {
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  /* Show controls on hover or when paused */
  .plyr:hover .plyr__controls,
  .plyr.plyr--paused .plyr__controls,
  .plyr.plyr--stopped .plyr__controls,
  .plyr:focus-within .plyr__controls {
    opacity: 1;
  }

  /* Smooth transition for control bar */
  .plyr__controls button,
  .plyr__progress,
  .plyr__time,
  .plyr__volume {
    transition: all 0.2s ease;
  }

  /* Playlist scrollbar */
  .playlist-scroll::-webkit-scrollbar { width: 6px; }
  .playlist-scroll::-webkit-scrollbar-track { background: transparent; }
  .playlist-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hover-lift { transition: all 0.2s ease; }
  .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

  .btn-press:active { transform: scale(0.96); }

  .line-clamp-2 {
    display: -webkit-box;
    --webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  @media (max-width: 1023px) {
    .hide-scrollbar-mobile::-webkit-scrollbar { display: none; }
    .hide-scrollbar-mobile { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Always show controls on mobile (touch devices) */
    .plyr__controls {
      opacity: 1 !important;
    }
  }
</style>
</head>
<body class="text-white antialiased min-h-screen">

<div class="flex flex-col lg:flex-row gap-4 lg:gap-6 p-3 sm:p-4 lg:p-6 max-w-[1800px] mx-auto items-start">
  
  <main class="w-full lg:w-[70%] xl:w-[65%] flex-shrink-0">
    
    <!-- PLAYER WRAPPER -->
    <div id="player-wrapper">
      
      <!-- Layer 10: Skeleton (shimmer ONLY - no spinner!) -->
      <div id="player-skeleton" class="skeleton"></div>

      <!-- Layer 20: Thumbnail + SINGLE Loader/Hover Play Button -->
      <div id="thumb-preview" style="display: none;">
        <div class="thumb-loader">
          <i class="fa-solid fa-circle-notch spinner-icon fa-spin"></i>
          <i class="fa-solid fa-play play-icon"></i>
        </div>
      </div>

      <!-- Layer 30: Player (when PLAYING) -->
      <div id="player-container" style="display: none;"></div>
      
    </div>

    <!-- Title Section -->
    <div id="title-section" class="mt-3 sm:mt-4">
      <div id="title-skeleton" class="h-6 sm:h-7 w-3/4 rounded skeleton mb-3"></div>
      <h1 id="video-title" class="hidden text-lg sm:text-xl lg:text-2xl font-semibold leading-relaxed fade-in"></h1>
    </div>
    
    <!-- Actions Bar -->
    <div class="flex flex-wrap gap-2 sm:gap-3 mt-3 sm:mt-4 pb-4 border-b border-neutral-800">
      
      <button id="like-btn" onclick="handleLike()" class="flex items-center gap-2 bg-yt-dark hover:bg-neutral-700 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-medium transition btn-press hover-lift">
        <i class="fa-solid fa-thumbs-up"></i> 
        <span id="like-count">0</span>
      </button>
      
      <button onclick="handleShare()" class="flex items-center gap-2 bg-yt-dark hover:bg-neutral-700 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-medium transition btn-press hover-lift">
        <i class="fa-solid fa-share"></i> 
        <span class="hidden sm:inline">Share</span>
      </button>
      
      <button id="fav-btn" onclick="toggleFavorite()" class="flex items-center gap-2 bg-yt-dark hover:bg-neutral-700 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-medium transition btn-press hover-lift">
        <i class="fa-regular fa-star"></i> 
        <span class="hidden sm:inline">Save</span>
      </button>

      <button onclick="playNext()" class="flex items-center gap-2 bg-yt-dark hover:bg-neutral-700 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-medium transition btn-press hover-lift ml-auto">
        <span class="hidden sm:inline">Next</span>
        <i class="fa-solid fa-forward"></i>
      </button>
    </div>
  </main>

  <!-- RIGHT: Playlist -->
  <aside id="playlist-container" class="w-full lg:w-[30%] xl:w-[35%] min-w-0 lg:min-w-[320px]">
    
    <div class="flex items-center justify-between mb-3 px-1">
      <h2 class="text-base sm:text-lg font-semibold flex items-center gap-2">
        <i class="fa-solid fa-list text-yt-red"></i>
        Up Next
      </h2>
      <span id="video-count" class="text-xs text-yt-gray">0 videos</span>
    </div>

    <div id="playlist" class="max-h-[50vh] lg:max-h-[70vh] overflow-y-auto playlist-scroll hide-scrollbar-mobile space-y-2 pr-1">
      
      <div id="playlist-skeleton" class="space-y-2">
        <div class="flex gap-3 p-2 animate-pulse">
          <div class="w-32 sm:w-40 h-20 sm:h-24 rounded-lg skeleton flex-shrink-0"></div>
          <div class="flex-1 space-y-2 pt-1">
            <div class="h-4 w-full rounded skeleton"></div>
            <div class="h-3 w-2/3 rounded skeleton"></div>
          </div>
        </div>
        <div class="flex gap-3 p-2 animate-pulse">
          <div class="w-32 sm:w-40 h-20 sm:h-24 rounded-lg skeleton flex-shrink-0"></div>
          <div class="flex-1 space-y-2 pt-1">
            <div class="h-4 w-full rounded skeleton"></div>
            <div class="h-3 w-2/3 rounded skeleton"></div>
          </div>
        </div>
        <div class="flex gap-3 p-2 animate-pulse">
          <div class="w-32 sm:w-40 h-20 sm:h-24 rounded-lg skeleton flex-shrink-0"></div>
          <div class="flex-1 space-y-2 pt-1">
            <div class="h-4 w-full rounded skeleton"></div>
            <div class="h-3 w-2/3 rounded skeleton"></div>
          </div>
        </div>
      </div>
      
    </div>
  </aside>

</div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-neutral-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
  <span id="toast-message"></span>
</div>

<!-- Scripts -->
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="list.js"></script>

<script>
/**
 * ============================================
 * YOUTUBE CLONE - CLEAN PLAYER EXPERIENCE
 * 
 * FIXES:
 * ✅ Hidden Plyr's circular "C" loading overlay
 * ✅ Single custom loader system
 * ✅ Auto-hide controls when playing
 * ✅ Show controls on hover/pause
 * ✅ Mobile: always show controls (touch-friendly)
 * 
 * LAYERS:
 * 10: Skeleton (shimmer only)
 * 20: Thumbnail + Custom Loader/Play Button
 * 30: Player (video with smart controls)
 * ============================================
 */

// --- STATE ---
const state = {
  player: null,
  currentIndex: 0,
  videoList: [],
  likes: {},
  favorites: {},
  isLoading: true,
  currentThumbnail: '',
  isSeeking: false
};

// --- DOM ---
const dom = {
  playerWrapper: document.getElementById('player-wrapper'),
  playerContainer: document.getElementById('player-container'),
  playerSkeleton: document.getElementById('player-skeleton'),
  thumbPreview: document.getElementById('thumb-preview'),
  videoTitle: document.getElementById('video-title'),
  titleSkeleton: document.getElementById('title-skeleton'),
  likeCount: document.getElementById('like-count'),
  likeBtn: document.getElementById('like-btn'),
  favBtn: document.getElementById('fav-btn'),
  playlist: document.getElementById('playlist'),
  playlistSkeleton: document.getElementById('playlist-skeleton'),
  videoCount: document.getElementById('video-count'),
  toast: document.getElementById('toast'),
  toastMessage: document.getElementById('toast-message')
};

// --- UTILITIES ---
function sanitizeHTML(str) {
  const d = document.createElement('d');
  d.textContent = str;
  return d.innerHTML;
}

function debounce(fn, wait) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), wait); };
}

let toastTimer;
function showToast(msg, dur = 2500) {
  dom.toastMessage.textContent = msg;
  dom.toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
  dom.toast.classList.add('opacity-100', 'translate-y-0');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    dom.toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
    dom.toast.classList.remove('opacity-100', 'translate-y-0');
  }, dur);
}

// === LAYER SWITCHER ===
function showLayer(layer) {
  dom.playerSkeleton.style.display = 'none';
  dom.thumbPreview.style.display = 'none';
  dom.playerContainer.style.display = 'none';
  
  switch(layer) {
    case 'skeleton':
      dom.playerSkeleton.style.display = 'block';
      break;
    case 'thumb':
      dom.thumbPreview.style.display = 'flex';
      break;
    case 'player':
      dom.playerContainer.style.display = 'block';
      break;
  }
}

function setTitleSkeleton(show) {
  dom.titleSkeleton.classList.toggle('hidden', !show);
  dom.videoTitle.classList.toggle('hidden', show);
}

function setPlaylistSkeleton(show) {
  dom.playlistSkeleton.style.display = show ? 'block' : 'none';
}

// === PLAYER SETUP ===
function initPlayer(videoId) {
  return new Promise((resolve, reject) => {
    if (state.player) {
      try { state.player.off(); state.player.destroy(); } catch(e){}
      state.player = null;
    }

    dom.playerContainer.innerHTML = `
      <div id="plyr" data-plyr-provider="youtube" data-plyr-embed-id="${sanitizeHTML(videoId)}"></div>
    `;

    state.player = new Plyr('#plyr', {
      autoplay: true,
      muted: false,
      controls: ['restart','play','progress','current-time','mute','volume','captions','settings','pip','airplay','fullscreen'],
      settings: ['captions','quality','speed','loop'],
      keyboard: { focused: true, global: true },
      tooltips: { controls: true, seek: true },
      storage: { enabled: true, key: 'plyr' },
      speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
      quality: { default: 720, options: [4320,2880,2160,1440,1080,720,480,360,240] },
      loop: { active: false },
      clickToPlay: true,
      hideControls: true, // Let our CSS handle control visibility
      resetOnEnd: false,
      invertTime: true,
      seekTime: 10,
      volume: 1
    });

    // Event Listeners
    state.player.on('ready', () => resolve());
    state.player.on('error', () => reject('Player error'));
    
    // PLAYING → Show player
    state.player.on('playing', () => {
      showLayer('player');
      state.isSeeking = false;
    });
    
    // PAUSED → Show thumbnail with single loader
    state.player.on('pause', () => {
      if (!state.isSeeking) {
        showThumbWithLoader();
      }
    });
    
    // SEEKING (dragging) → Show thumbnail + loader
    state.player.on('seeking', () => {
      state.isSeeking = true;
      showThumbWithLoader(true);
    });
    
    // SEEKED (released) → Auto-play!
    state.player.on('seeked', () => {
      state.isSeeking = false;
      setTimeout(() => {
        if (state.player) {
          state.player.play().catch(e => console.log('Autoplay after seek:', e));
        }
      }, 100);
    });
    
    // Video ended → auto next
    state.player.on('ended', () => {
      playNext();
    });
  });
}

// === SHOW THUMBNAIL WITH SINGLE LOADER ===
function showThumbWithLoader(seekingMode = false) {
  if (state.currentThumbnail) {
    dom.thumbPreview.style.backgroundImage = `url('${state.currentThumbnail}')`;
  }
  
  if (seekingMode) {
    dom.thumbPreview.classList.add('seeking-mode');
  } else {
    dom.thumbPreview.classList.remove('seeking-mode');
  }
  
  showLayer('thumb');
}

// CLICK HANDLER FOR THUMBNAIL (Resume on click)
dom.thumbPreview.addEventListener('click', () => {
  if (!state.isSeeking && state.player) {
    state.player.play().catch(e => console.log('Play error:', e));
  }
});

// === LOAD VIDEO ===
async function loadVideo(idx) {
  if (!state.videoList.length || idx < 0 || idx >= state.videoList.length) return;
  
  state.isLoading = true;
  state.currentIndex = idx;
  state.isSeeking = false;
  const vid = state.videoList[idx];
  
  state.currentThumbnail = vid.thumbnail;
  
  showLayer('skeleton'); // Show shimmer (NO spinner!)
  setTitleSkeleton(true);
  
  dom.videoTitle.textContent = vid.title;
  document.title = `${vid.title} - YouTube Clone`;
  window.history.replaceState({}, '', `?id=${encodeURIComponent(vid.id)}`);
  dom.likeCount.textContent = state.likes[vid.id] || 0;
  
  updateUI();
  
  try {
    await initPlayer(vid.id);
    
    // NOW show thumbnail with THE SINGLE LOADER
    showThumbWithLoader();
    setTitleSkeleton(false);
    state.isLoading = false;
    
    // Auto-start
    setTimeout(() => {
      if (state.player) {
        state.player.play().catch(e => console.log('Autoplay:', e));
      }
    }, 300);
    
  } catch(err) {
    console.error('Load error:', err);
    showToast('❌ Failed to load');
    showLayer('skeleton');
  }
}

// === UPDATE UI ===
function updateUI() {
  updateFavBtn();
  renderPlaylist();
  highlightCurrent();
}

// === PLAYLIST ===
function renderPlaylist() {
  const frag = document.createDocumentFragment();
  dom.playlist.querySelectorAll('.playlist-item').forEach(el => el.remove());
  
  state.videoList.forEach((v, i) => {
    frag.appendChild(createItem(v, i));
  });
  
  setPlaylistSkeleton(false);
  dom.playlist.appendChild(frag);
  dom.videoCount.textContent = `${state.videoList.length} videos`;
}

function createItem(video, idx) {
  const el = document.createElement('div');
  const active = idx === state.currentIndex;
  const fav = state.favorites[video.id];
  
  el.className = `playlist-item flex gap-2 sm:gap-3 p-2 rounded-xl cursor-pointer transition-all duration-200 hover:bg-yt-dark ${active ? 'bg-neutral-800 ring-1 ring-yt-red/50' : ''}`;
  
  el.innerHTML = `
    <div class="relative w-28 sm:w-36 lg:w-40 h-16 sm:h-20 lg:h-24 flex-shrink-0 rounded-lg overflow-hidden bg-neutral-900 group">
      <img src="${sanitizeHTML(video.thumbnail)}" alt="${sanitizeHTML(video.title)}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy" decoding="async">
      <div class="absolute bottom-1 right-1 bg-black/90 text-white text-xs px-1.5 py-0.5 rounded font-medium">${sanitizeHTML(video.duration)}</div>
      ${active ? '<div class="absolute inset-0 bg-black/30 flex items-center justify-center"><i class="fa-solid fa-play text-white text-lg"></i></div>' : ''}
    </div>
    <div class="flex-1 flex flex-col justify-center overflow-hidden min-w-0">
      <h3 class="text-xs sm:text-sm font-medium line-clamp-2 leading-tight ${active ? 'text-white' : 'text-gray-200'}">${sanitizeHTML(video.title)}</h3>
      <div class="flex items-center gap-2 mt-1">
        ${fav ? '<i class="fa-solid fa-star text-yellow-400 text-xs" title="Saved"></i>' : ''}
        ${active ? '<span class="text-yt-red text-xs font-medium">Now Playing</span>' : ''}
      </div>
    </div>
  `;
  
  el.onclick = debounce(() => {
    loadVideo(idx);
    if (window.innerWidth < 1024) dom.playerWrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 150);
  
  return el;
}

function highlightCurrent() {
  dom.playlist.querySelectorAll('.playlist-item').forEach((el, i) => {
    const active = i === state.currentIndex;
    el.classList.toggle('bg-neutral-800', active);
    el.classList.toggle('ring-1', active);
    el.classList.toggle('ring-yt-red/50', active);
  });
  
  const activeEl = dom.playlist.querySelector(`.playlist-item:nth-child(${state.currentIndex + 1})`);
  if (activeEl) requestAnimationFrame(() => activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
}

// === ACTIONS ===

function handleLike() {
  const v = state.videoList[state.currentIndex];
  if (!v) return;
  state.likes[v.id] = (state.likes[v.id] || 0) + 1;
  try { localStorage.setItem('yt_likes', JSON.stringify(state.likes)); } catch(e){}
  dom.likeCount.textContent = state.likes[v.id];
  dom.likeBtn.classList.add('scale-110', 'text-yt-red');
  setTimeout(() => dom.likeBtn.classList.remove('scale-110', 'text-yt-red'), 200);
  showToast('❤️ Liked!');
}

async function handleShare() {
  const url = location.href;
  if (navigator.share) {
    try { await navigator.share({ title: state.videoList[state.currentIndex]?.title, url }); return; } catch(e){}
  }
  try { await navigator.clipboard.writeText(url); showToast('📋 Copied!'); } catch(e){ prompt('Copy:', url); }
}

function toggleFavorite() {
  const v = state.videoList[state.currentIndex];
  if (!v) return;
  state.favorites[v.id] = !state.favorites[v.id];
  try { localStorage.setItem('yt_favorites', JSON.stringify(state.favorites)); } catch(e){}
  updateFavBtn();
  renderPlaylist();
  showToast(state.favorites[v.id] ? '⭐ Saved!' : 'Removed');
}

function updateFavBtn() {
  const v = state.videoList[state.currentIndex];
  if (!v) return;
  const fav = state.favorites[v.id];
  if (fav) {
    dom.favBtn.innerHTML = '<i class="fa-solid fa-star text-yellow-400"></i><span class="hidden sm:inline">Saved</span>';
    dom.favBtn.classList.add('bg-yellow-500/20', 'border', 'border-yellow-500/50');
  } else {
    dom.favBtn.innerHTML = '<i class="fa-regular fa-star"></i><span class="hidden sm:inline">Save</span>';
    dom.favBtn.classList.remove('bg-yellow-500/20', 'border', 'border-yellow-500/50');
  }
}

function playNext() {
  loadVideo((state.currentIndex + 1) % state.videoList.length);
  showToast('⏭️ Next');
}

function playPrev() {
  loadVideo((state.currentIndex - 1 + state.videoList.length) % state.videoList.length);
}

// === KEYBOARD ===
document.addEventListener('keydown', debounce((e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  
  switch(e.key.toLowerCase()) {
    case ' ': case 'k':
      if (state.player) { e.preventDefault(); state.player.togglePlay(); }
      break;
    case 'arrowright':
      if (e.shiftKey) { e.preventDefault(); playNext(); }
      else if (state.player) state.player.seek(state.player.currentTime + 10);
      break;
    case 'arrowleft':
      if (e.shiftKey) { e.preventDefault(); playPrev(); }
      else if (state.player) state.player.seek(Math.max(0, state.player.currentTime - 10));
      break;
    case 'f': if (state.player) state.player.fullscreen.toggle(); break;
    case 'm': if (state.player) state.player.muted = !state.player.muted; break;
    case 'j': if (state.player) state.player.seek(Math.max(0, state.player.currentTime - 10)); break;
    case 'l': if (state.player) state.player.seek(state.player.currentTime + 10); break;
  }
}, 50));

// === LOAD DATA ===
function loadData() {
  try {
    const l = localStorage.getItem('yt_likes');
    const f = localStorage.getItem('yt_favorites');
    if (l) state.likes = JSON.parse(l);
    if (f) state.favorites = JSON.parse(f);
  } catch(e) {
    state.likes = {};
    state.favorites = {};
  }
}

// === INIT ===
async function init() {
  console.log('🎬 Initializing YouTube Clone (Clean Player)...');
  
  if (typeof videoList === 'undefined' || !videoList.length) {
    dom.playerSkeleton.innerHTML = `<div class="text-center p-8"><i class="fa-solid fa-exclamation-triangle text-5xl text-yellow-500 mb-4 block"></i><p class="text-xl font-semibold mb-2">No Videos</p><p class="text-sm text-gray-400">Check list.js</p></div>`;
    return;
  }
  
  state.videoList = videoList;
  loadData();
  
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  let startIdx = 0;
  if (id) {
    const found = state.videoList.findIndex(v => v.id === id);
    if (found !== -1) startIdx = found;
  }
  
  await loadVideo(startIdx);
  console.log(`✅ Ready! ${state.videoList.length} videos | Clean Player: ON`);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
