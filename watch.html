<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Clone</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* Layout */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* LEFT */
.video-section {
  flex: 2;
}

/* Player */
.player-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
}

/* Thumbnail overlay */
#thumb-overlay {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

.play-btn {
  width: 70px;
  height: 70px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.play-btn::before {
  content: '';
  border-left: 22px solid white;
  border-top: 12px solid transparent;
  border-bottom: 12px solid transparent;
}

/* TITLE (UPDATED BIGGER LIKE H4) */
#video-title {
  margin-top: 12px;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.4;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}

.actions div {
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  transition: 0.2s;
}

.actions div:hover {
  background: #222;
}

/* RIGHT PLAYLIST */
.playlist {
  flex: 1;
  max-width: 360px;
  max-height: 90vh;
  overflow-y: auto;
  padding-right: 6px;
  scroll-behavior: smooth;
}

/* SCROLLBAR STYLE */
.playlist::-webkit-scrollbar {
  width: 6px;
}

.playlist::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

.playlist::-webkit-scrollbar-thumb:hover {
  background: #666;
}

/* ITEM */
.video-item {
  display: flex;
  gap: 10px;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.2s;
}

.video-item:hover {
  background: #222;
  transform: scale(1.01);
}

.video-item.active {
  background: #333;
}

/* THUMB */
.thumb {
  width: 140px;
  height: 80px;
  position: relative;
  flex-shrink: 0;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
}

/* DURATION */
.duration {
  position: absolute;
  bottom: 5px;
  right: 5px;
  background: rgba(0,0,0,0.8);
  padding: 2px 6px;
  font-size: 12px;
  border-radius: 4px;
}

/* FAVORITE ICON */
.fav {
  margin-left: auto;
  color: #aaa;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s;
}

.fav.active {
  color: gold;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }

  .playlist {
    max-width: 100%;
    max-height: none;
  }
}

/* THEME */
:root {
  --plyr-color-main: #ff0000;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="video-section">

    <div class="player-wrapper">
      <div id="thumb-overlay">
        <div class="play-btn"></div>
      </div>
      <div id="player"></div>
    </div>

    <div id="video-title"></div>

    <div class="actions">
      <div onclick="likeVideo()">❤️ Like (<span id="like-count">0</span>)</div>
      <div onclick="shareVideo()">🔗 Share</div>
      <div onclick="toggleFav()">⭐ Favorite</div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="playlist" id="playlist"></div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="list.js"></script>

<script>
let player;
let currentIndex = 0;
const savedLikes = JSON.parse(localStorage.getItem("likes")) || {};
const favorites = JSON.parse(localStorage.getItem("fav")) || {};

function loadVideo(index) {
  currentIndex = index;
  const video = videoList[index];

  document.getElementById("player").innerHTML =
    `<div data-plyr-provider="youtube" data-plyr-embed-id="${video.id}"></div>`;

  if (player) player.destroy();

  player = new Plyr('#player div');

  const overlay = document.getElementById("thumb-overlay");
  overlay.style.backgroundImage = `url('${video.thumbnail}')`;
  overlay.style.display = "flex";

  overlay.onclick = () => {
    overlay.style.display = "none";
    player.play();
  };

  player.on('pause', () => overlay.style.display = "flex");
  player.on('play', () => overlay.style.display = "none");

  document.getElementById("video-title").textContent = video.title;
  document.title = video.title;

  document.getElementById("like-count").textContent =
    savedLikes[video.id] || 0;

  window.history.replaceState({}, '', '?id=' + video.id);

  highlightFav();
  highlight();

  player.on('ended', () => {
    loadVideo((currentIndex + 1) % videoList.length);
  });
}

function likeVideo() {
  const video = videoList[currentIndex];
  savedLikes[video.id] = (savedLikes[video.id] || 0) + 1;
  localStorage.setItem("likes", JSON.stringify(savedLikes));
  document.getElementById("like-count").textContent = savedLikes[video.id];
}

function shareVideo() {
  const video = videoList[currentIndex];
  const url = window.location.href.split('?')[0] + '?id=' + video.id;
  navigator.clipboard.writeText(url);
  alert("Copied:\n" + url);
}

function toggleFav() {
  const video = videoList[currentIndex];
  favorites[video.id] = !favorites[video.id];
  localStorage.setItem("fav", JSON.stringify(favorites));
  highlightFav();
}

function highlightFav() {
  const video = videoList[currentIndex];
  const favBtn = document.querySelector(".actions div:nth-child(3)");
  if (favorites[video.id]) {
    favBtn.classList.add("active");
    favBtn.innerHTML = "⭐ Favorited";
  } else {
    favBtn.classList.remove("active");
    favBtn.innerHTML = "⭐ Favorite";
  }
}

/* PLAYLIST */
const playlist = document.getElementById("playlist");

videoList.forEach((video, index) => {
  const el = document.createElement("div");
  el.className = "video-item";

  el.innerHTML = `
    <div class="thumb">
      <img src="${video.thumbnail}">
      <div class="duration">${video.duration}</div>
    </div>
    <div>
      <div>${video.title}</div>
    </div>
    <div class="fav">
      <i class="fa-solid fa-star"></i>
    </div>
  `;

  el.onclick = () => loadVideo(index);
  playlist.appendChild(el);
});

function highlight() {
  document.querySelectorAll(".video-item").forEach((el, i) => {
    el.classList.toggle("active", i === currentIndex);
  });
}

/* LOAD */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const startIndex = videoList.findIndex(v => v.id === id);

loadVideo(startIndex !== -1 ? startIndex : 0);
</script>

</body>
</html>
